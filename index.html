<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLAD ご奉仕立願</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&family=Noto+Serif+SC:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#f7f4ef;--paper-warm:#ede8df;--card:#fff;
  --ink:#2a2520;--ink-mid:#6b6058;--ink-faint:#a89f96;
  --border:rgba(42,37,32,0.1);--border-mid:rgba(42,37,32,0.18);
  --gold:#8b7355;--gold-light:#e8dece;--gold-dark:#6b5840;
  --danger:#8b3a3a;--radius:2px;
}
body{font-family:'Noto Sans JP','Noto Sans SC',sans-serif;font-weight:300;background:var(--paper);color:var(--ink);min-height:100vh;line-height:1.8;}

/* LANG SWITCHER */
.lang-bar{background:rgba(0,0,0,0.25);display:flex;justify-content:flex-end;padding:6px 1.5rem;gap:4px;}
.lang-btn{padding:3px 10px;background:none;border:1px solid rgba(255,255,255,0.25);border-radius:1px;color:rgba(255,255,255,0.5);font-size:0.68rem;cursor:pointer;letter-spacing:0.06em;transition:all 0.18s;font-family:inherit;}
.lang-btn:hover{border-color:rgba(255,255,255,0.55);color:rgba(255,255,255,0.8);}
.lang-btn.active{border-color:var(--gold);color:var(--gold-light);background:rgba(139,115,85,0.18);}


header{background:var(--ink);padding:1.5rem 2rem 1.75rem;text-align:center;}
.header-mon{width:44px;height:44px;margin:0 auto 1rem;display:block;}
header h1{font-family:'Noto Serif JP','Noto Serif SC',serif;font-weight:400;font-size:clamp(1rem,3vw,1.35rem);color:rgba(255,255,255,0.88);letter-spacing:0.25em;margin-bottom:0.3rem;}
.header-sub{font-size:0.72rem;color:rgba(255,255,255,0.38);letter-spacing:0.18em;}
.header-period{margin-top:0.9rem;font-size:0.78rem;color:rgba(200,175,130,0.8);letter-spacing:0.15em;font-family:'Noto Serif JP','Noto Serif SC',serif;}

nav{background:var(--ink);border-top:1px solid rgba(255,255,255,0.07);display:flex;justify-content:center;}
.nav-item{padding:0.7rem 1.8rem;font-size:0.72rem;color:rgba(255,255,255,0.38);cursor:pointer;letter-spacing:0.15em;border-bottom:1.5px solid transparent;transition:all 0.2s;}
.nav-item:hover{color:rgba(255,255,255,0.65);}
.nav-item.active{color:rgba(200,175,130,0.9);border-bottom-color:var(--gold);}

.panel{display:none;}.panel.active{display:block;}
.wrap{max-width:860px;margin:0 auto;padding:2.5rem 1.5rem;box-sizing:border-box;width:100%;}

.sec-head{text-align:center;margin-bottom:2rem;}
.sec-title{font-family:'Noto Serif JP','Noto Serif SC',serif;font-weight:400;font-size:0.95rem;letter-spacing:0.22em;color:var(--ink);margin-bottom:0.7rem;}
.sec-rule{height:1px;background:var(--border-mid);position:relative;margin:0 auto;max-width:220px;}
.sec-rule::after{content:'◆';position:absolute;left:50%;transform:translateX(-50%) translateY(-50%);background:var(--paper);padding:0 8px;font-size:7px;color:var(--gold);}

.month-label{font-size:0.7rem;color:var(--ink-faint);letter-spacing:0.12em;margin-bottom:0.75rem;padding-left:2px;}

.events-grid{display:flex;flex-direction:column;gap:7px;margin-bottom:1.75rem;}
.event-card{display:flex;align-items:stretch;background:var(--card);border:1px solid var(--border-mid);border-radius:var(--radius);cursor:pointer;transition:border-color 0.18s,background 0.18s;overflow:hidden;min-width:0;}
.event-card:hover{border-color:var(--gold);}
.event-card.selected{border-color:var(--gold);background:var(--gold-light);}
.event-date-col{width:58px;flex-shrink:0;background:var(--paper-warm);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;border-right:1px solid var(--border);transition:background 0.18s;}
.event-card.selected .event-date-col{background:rgba(139,115,85,0.14);}
.event-date-day{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:1.35rem;line-height:1;color:var(--ink);}
.event-date-wd{font-size:0.6rem;color:var(--ink-faint);letter-spacing:0.06em;margin-top:3px;}
.event-date-wd.sat{color:#4a6080;}.event-date-wd.sun{color:#7a3a30;}
.event-body{flex:1;padding:10px 13px;min-width:0;}
.event-name{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.88rem;color:var(--ink);letter-spacing:0.06em;line-height:1.6;}
.event-meta{font-size:0.7rem;color:var(--ink-mid);margin-top:3px;}
.event-right{display:flex;align-items:center;padding:10px 13px;flex-shrink:0;}

.check-mark{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--border-mid);display:flex;align-items:center;justify-content:center;transition:all 0.18s;}
.event-card.selected .check-mark{background:var(--gold);border-color:var(--gold);}
.check-mark svg{opacity:0;transition:opacity 0.15s;}
.event-card.selected .check-mark svg{opacity:1;}

.sel-summary{background:var(--ink);color:rgba(255,255,255,0.78);padding:11px 16px;border-radius:var(--radius);font-size:0.76rem;letter-spacing:0.06em;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.sel-summary.hidden{display:none;}
.sel-count em{font-style:normal;font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:1.05rem;color:rgba(200,175,130,0.9);}

.form-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;}
.form-section-title{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.75rem;color:var(--ink-mid);letter-spacing:0.15em;margin-bottom:1.1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:0.72rem;color:var(--ink-mid);letter-spacing:0.08em;margin-bottom:5px;}
.req{color:var(--gold);margin-left:2px;}
input[type=text],input[type=email],input[type=number],select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--paper);color:var(--ink);font-family:'Noto Sans JP','Noto Sans SC',sans-serif;font-weight:300;font-size:0.85rem;transition:border-color 0.2s,box-shadow 0.2s;outline:none;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(139,115,85,0.1);background:var(--card);}
textarea{resize:vertical;min-height:68px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.form-row{grid-template-columns:1fr;}}

.err{color:var(--danger);font-size:0.75rem;margin-bottom:10px;display:none;}
.submit-btn{width:100%;padding:13px;background:var(--ink);color:rgba(255,255,255,0.85);border:none;border-radius:var(--radius);font-family:'Noto Serif JP','Noto Serif SC',serif;font-weight:400;font-size:0.85rem;letter-spacing:0.2em;cursor:pointer;transition:background 0.2s;}
.submit-btn:hover{background:#3d3530;}

.confirm-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;text-align:center;display:none;}
.confirm-block.vis{display:block;}
.confirm-icon{width:40px;height:40px;margin:0 auto 1rem;}
.confirm-title{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.95rem;letter-spacing:0.18em;margin-bottom:0.5rem;}
.confirm-name{font-size:0.82rem;color:var(--ink-mid);}
.confirm-events{margin-top:1rem;text-align:left;background:var(--paper-warm);padding:12px 16px;border-radius:var(--radius);}
.confirm-event-item{font-size:0.76rem;color:var(--ink-mid);padding:3px 0;letter-spacing:0.04em;}
.confirm-event-item::before{content:'◇ ';color:var(--gold);}
.reset-btn{margin-top:1.5rem;padding:8px 24px;background:none;border:1px solid var(--border-mid);border-radius:var(--radius);cursor:pointer;font-family:'Noto Sans JP','Noto Sans SC',sans-serif;font-size:0.75rem;letter-spacing:0.1em;color:var(--ink-mid);transition:border-color 0.2s;}
.reset-btn:hover{border-color:var(--gold);}

.list-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem;}
.filter-btn{padding:5px 13px;border:1px solid var(--border-mid);border-radius:var(--radius);background:none;font-family:'Noto Sans JP','Noto Sans SC',sans-serif;font-size:0.7rem;letter-spacing:0.06em;color:var(--ink-mid);cursor:pointer;transition:all 0.18s;}
.filter-btn:hover{border-color:var(--gold);}
.filter-btn.active{background:var(--ink);color:rgba(255,255,255,0.8);border-color:var(--ink);}
.att-group{margin-bottom:1.5rem;}
.att-group-label{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.78rem;color:var(--ink-mid);letter-spacing:0.12em;padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.attendee-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);}
.att-num{font-size:0.68rem;color:var(--ink-faint);min-width:18px;text-align:right;}
.att-avatar{width:30px;height:30px;border-radius:50%;background:var(--gold-light);color:var(--gold-dark);display:flex;align-items:center;justify-content:center;font-size:0.68rem;flex-shrink:0;}
.att-info{flex:1;min-width:0;}
.att-name{font-size:0.85rem;}
.att-sub{font-size:0.68rem;color:var(--ink-faint);}
.empty{text-align:center;padding:3rem;color:var(--ink-faint);font-size:0.78rem;letter-spacing:0.12em;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:2rem;}
.stat{background:var(--card);border:1px solid var(--border);padding:1rem;text-align:center;}
.stat-n{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:1.8rem;color:var(--ink);line-height:1;}
.stat-l{font-size:0.65rem;color:var(--ink-faint);letter-spacing:0.08em;margin-top:4px;}
.adm-event-section{margin-bottom:1.5rem;}
.adm-event-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--paper-warm);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;}
.adm-event-name{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.8rem;letter-spacing:0.08em;}
.adm-event-count{font-size:0.72rem;color:var(--ink-mid);}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:0.78rem;}
th{text-align:left;padding:7px 10px;font-size:0.65rem;letter-spacing:0.08em;color:var(--ink-faint);border-bottom:1px solid var(--border-mid);font-weight:400;white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
tr:hover td{background:var(--paper-warm);}
.del-btn{background:none;border:1px solid rgba(139,58,58,0.3);color:var(--danger);padding:3px 9px;border-radius:1px;font-size:0.65rem;cursor:pointer;font-family:inherit;letter-spacing:0.04em;transition:all 0.18s;}
.del-btn:hover{background:rgba(139,58,58,0.07);}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);color:rgba(255,255,255,0.82);padding:11px 16px;border-radius:var(--radius);font-size:0.75rem;letter-spacing:0.06em;box-shadow:0 6px 24px rgba(0,0,0,0.2);display:flex;align-items:center;gap:9px;transform:translateY(60px);opacity:0;transition:all 0.3s cubic-bezier(.34,1.56,.64,1);z-index:999;max-width:300px;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;pointer-events:auto;}
.checkbox-group{display:flex;flex-wrap:wrap;gap:6px 12px;padding:4px 0;}
.cb-item{display:flex;align-items:center;gap:5px;font-size:0.82rem;color:var(--ink);cursor:pointer;letter-spacing:0.04em;}
.cb-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--gold);cursor:pointer;flex-shrink:0;}

#adminOverlay{display:none;}
#adminOverlay.open{display:flex;align-items:center;justify-content:center;}
.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;}

/* ── MOBILE ── */
@media(max-width:600px){
  .lang-bar{padding:6px 1rem;}
  .lang-btn{padding:4px 10px;font-size:0.7rem;}
  header{padding:1.25rem 1rem 1.5rem;}
  .header-mon{width:36px;height:36px;margin-bottom:0.75rem;}
  header h1{font-size:0.95rem;letter-spacing:0.1em;}
  .header-sub{font-size:0.68rem;letter-spacing:0.1em;}
  .header-period{font-size:0.72rem;}
  nav{justify-content:stretch;}
  .nav-item{flex:1;text-align:center;padding:0.75rem 0.25rem;font-size:0.65rem;letter-spacing:0.04em;}
  .wrap{padding:1.25rem 0.85rem;}
  .sec-title{font-size:0.85rem;letter-spacing:0.1em;}
  /* イベントカード */
  .event-date-col{width:48px;}
  .event-date-day{font-size:1.1rem;}
  .event-body{padding:8px 8px;}
  .event-name{font-size:0.78rem;letter-spacing:0.02em;}
  .event-meta{font-size:0.64rem;}
  .event-right{padding:8px 8px;}
  .check-mark{width:17px;height:17px;}
  /* サマリー */
  .sel-summary{flex-direction:column;align-items:flex-start;gap:4px;padding:10px 12px;}
  /* フォーム */
  .form-section{padding:1rem 0.85rem;}
  .form-section-title{font-size:0.7rem;}
  .form-group{margin-bottom:0.85rem;}
  label{font-size:0.7rem;}
  input[type=text],input[type=email],input[type=number],select,textarea{font-size:1rem;padding:8px 10px;}
  .checkbox-group{gap:5px 10px;}
  .cb-item{font-size:0.8rem;}
  .submit-btn{font-size:0.82rem;padding:15px;letter-spacing:0.1em;}
  /* 確認画面 */
  .confirm-block{padding:1.75rem 1rem;}
  .confirm-event-item{font-size:0.72rem;}
  /* 統計 */
  .stats-row{grid-template-columns:1fr 1fr;}
  .stat-n{font-size:1.5rem;}
  /* テーブル */
  .tbl-wrap{margin:0 -0.85rem;padding:0 0.85rem;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{font-size:0.68rem;min-width:700px;}
  th,td{padding:5px 7px;}
  /* リスト */
  .list-filter{gap:4px;}
  .filter-btn{padding:4px 8px;font-size:0.64rem;}
  .att-group-label{font-size:0.72rem;}
  .attendee-item{gap:8px;padding:8px 0;}
  .att-avatar{width:26px;height:26px;font-size:0.62rem;}
  .att-name{font-size:0.8rem;}
  /* その他 */
  .toast{left:1rem;right:1rem;bottom:1rem;max-width:none;}
  #adminOverlay > div{width:calc(100% - 2rem);padding:1.5rem 1rem;}
  .month-label{font-size:0.65rem;}
}
</style>
</head>
<body>



<!-- LANG BAR -->
<div style="background:var(--ink);">
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('ja')">日本語</button>
    <button class="lang-btn" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
  </div>
</div>

<header>
  <svg class="header-mon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="20" stroke="rgba(200,175,130,0.45)" stroke-width="0.7"/>
    <circle cx="22" cy="22" r="14" stroke="rgba(200,175,130,0.45)" stroke-width="0.7"/>
    <circle cx="22" cy="22" r="3.5" fill="rgba(200,175,130,0.55)"/>
    <line x1="22" y1="2" x2="22" y2="8" stroke="rgba(200,175,130,0.55)" stroke-width="0.9"/>
    <line x1="22" y1="36" x2="22" y2="42" stroke="rgba(200,175,130,0.55)" stroke-width="0.9"/>
    <line x1="2" y1="22" x2="8" y2="22" stroke="rgba(200,175,130,0.55)" stroke-width="0.9"/>
    <line x1="36" y1="22" x2="42" y2="22" stroke="rgba(200,175,130,0.55)" stroke-width="0.9"/>
    <line x1="6" y1="6" x2="9.9" y2="9.9" stroke="rgba(200,175,130,0.35)" stroke-width="0.9"/>
    <line x1="34.1" y1="34.1" x2="38" y2="38" stroke="rgba(200,175,130,0.35)" stroke-width="0.9"/>
    <line x1="6" y1="38" x2="9.9" y2="34.1" stroke="rgba(200,175,130,0.35)" stroke-width="0.9"/>
    <line x1="34.1" y1="9.9" x2="38" y2="6" stroke="rgba(200,175,130,0.35)" stroke-width="0.9"/>
  </svg>
  <h1 id="hdr-title"></h1>
  <div class="header-sub">応現院</div>
  <div class="header-period" id="hdr-period"></div>
</header>

<nav>
  <div class="nav-item active" onclick="switchTab('form')" id="nav-form"></div>
  <div class="nav-item" onclick="switchTab('list')" id="nav-list"></div>
  <div class="nav-item" onclick="switchTab('admin')" id="nav-admin"></div>
</nav>

<!-- ADMIN LOGIN OVERLAY -->
<div id="adminOverlay" style="position:fixed;inset:0;background:rgba(26,22,18,0.7);z-index:200;">
  <div style="background:var(--card);border:1px solid var(--border-mid);border-radius:var(--radius);padding:2rem 2rem 1.75rem;width:320px;text-align:center;">
    <div style="font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.9rem;letter-spacing:0.2em;color:var(--ink);margin-bottom:1.25rem;">管理者ログイン</div>
    <!-- タブ切替 -->
    <div style="display:flex;gap:0;margin-bottom:1.25rem;border-bottom:1px solid var(--border-mid);">
      <button id="tab-pw-btn" onclick="switchLoginTab('pw')" style="flex:1;padding:7px;background:none;border:none;border-bottom:2px solid var(--gold);cursor:pointer;font-size:0.72rem;color:var(--gold-dark);font-family:inherit;letter-spacing:0.06em;">パスワード</button>
      <button id="tab-su-btn" onclick="switchLoginTab('su')" style="flex:1;padding:7px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:0.72rem;color:var(--ink-faint);font-family:inherit;letter-spacing:0.06em;">スーパーユーザー</button>
    </div>
    <!-- パスワードタブ -->
    <div id="login-tab-pw">
      <input type="password" id="adminPwInput" style="width:100%;padding:9px 12px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--paper);color:var(--ink);font-size:0.88rem;outline:none;letter-spacing:0.1em;" placeholder="パスワード" onkeydown="if(event.key==='Enter')confirmAdminLogin()">
    </div>
    <!-- スーパーユーザータブ -->
    <div id="login-tab-su" style="display:none;">
      <input type="email" id="adminEmailInput" style="width:100%;padding:9px 12px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--paper);color:var(--ink);font-size:0.85rem;outline:none;margin-bottom:8px;" placeholder="メールアドレス">
      <input type="password" id="adminSuPwInput" style="width:100%;padding:9px 12px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--paper);color:var(--ink);font-size:0.88rem;outline:none;letter-spacing:0.1em;" placeholder="パスワード" onkeydown="if(event.key==='Enter')confirmAdminLogin()">
    </div>
    <div id="overlay-err" style="color:var(--danger);font-size:0.72rem;margin-top:6px;min-height:1rem;"></div>
    <div style="display:flex;gap:8px;margin-top:1rem;">
      <button onclick="cancelAdminLogin()" style="flex:1;padding:9px;background:none;border:1px solid var(--border-mid);border-radius:var(--radius);cursor:pointer;font-size:0.78rem;color:var(--ink-mid);font-family:inherit;">キャンセル</button>
      <button onclick="confirmAdminLogin()" id="overlay-ok" style="flex:1;padding:9px;background:var(--ink);color:rgba(255,255,255,0.85);border:none;border-radius:var(--radius);cursor:pointer;font-size:0.78rem;font-family:inherit;">確認</button>
    </div>
  </div>
</div>

<!-- FORM -->
<div class="panel active" id="panel-form">
  <div class="wrap">
    <div class="sec-head">
      <div class="sec-title" id="sec-select"></div>
      <div class="sec-rule"></div>
    </div>
    <div class="month-label" id="month-label"></div>
    <div id="grid-main" class="events-grid"></div>
    <div class="sel-summary hidden" id="selSummary">
      <div class="sel-count"><em id="selCount">0</em> <span id="sel-unit"></span></div>
      <div id="selBreakdown" style="font-size:0.66rem;color:rgba(255,255,255,0.5);letter-spacing:0.04em"></div>
    </div>
    <div id="formWrap">
      <div id="reception-closed-msg" style="display:none;background:var(--paper-warm);border:1px solid var(--border-mid);border-radius:var(--radius);padding:2rem;text-align:center;margin-bottom:1rem;">
        <div style="font-family:'Noto Serif JP',serif;font-size:0.95rem;letter-spacing:0.15em;color:var(--ink);margin-bottom:0.5rem;">現在受付を停止しています</div>

<script>
// ── PROJECT CODE ──
const PROJECT_CODE = 'GLAD';
const MONTH_CODE = '2026-04'; // ← 毎月ここを変更してください

// ── 受付状態 ──
let receptionOpen = false; // デフォルトは閉鎖

function updateReceptionUI(isOpen) {
  receptionOpen = isOpen;
  const btn = document.getElementById('reception-toggle-btn');
  const lbl = document.getElementById('reception-status-label');
  const formWrap = document.getElementById('formWrap');
  const closedMsg = document.getElementById('reception-closed-msg');
  if (isOpen) {
    btn.textContent = '受付中 → 閉じる';
    btn.style.background = 'var(--danger)';
    btn.style.color = '#fff';
    lbl.textContent = '現在受付中です';
    if (formWrap) formWrap.style.display = 'block';
    if (closedMsg) closedMsg.style.display = 'none';
  } else {
    btn.textContent = '受付停止中 → 開く';
    btn.style.background = 'var(--ink)';
    btn.style.color = 'rgba(255,255,255,0.85)';
    lbl.textContent = '現在受付を停止しています';
    if (formWrap) formWrap.style.display = 'none';
    if (closedMsg) closedMsg.style.display = 'block';
  }
}

function resetChanges() {
  if (!confirm('当月のすべての追加・キャンセル記録を初期化します。\n\n・キャンセルされた立願は削除されます\n・現在の立願がすべて「最初の立願」として扱われます\n\nよろしいですか？')) return;
  const headers = {
    'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json', 'Prefer': 'return=minimal',
  };
  (async () => {
    showToast('初期化中...');
    // 1. キャンセル済み行を削除（cancelled_event_idsが空でなくevent_idsが空の行）
    // すべての行のprev_event_ids・cancelled_event_idsをリセット
    const rows = bookings;
    let ok = 0;
    for (const b of rows) {
      const res = await fetch(
        SUPABASE_URL + '/rest/v1/reservations?email=eq.' + encodeURIComponent(b.email) + '&month=eq.' + MONTH_CODE,
        { method: 'PATCH', headers, body: JSON.stringify({ prev_event_ids: '[]', cancelled_event_ids: '[]', status: '新規' }) }
      );
      if (res.ok) ok++;
    }
    showToast('✓ 初期化完了（' + ok + '件）');
    loadFromDb();
  })();
}

function loadReceptionStatus() {
  const key = PROJECT_CODE + '_' + MONTH_CODE + '_reception';
  fetch(SUPABASE_URL + '/rest/v1/settings?key=eq.' + encodeURIComponent(key) + '&select=value', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY },
  })
  .then(r => r.json())
  .then(rows => {
    const isOpen = Array.isArray(rows) && rows.length > 0 && rows[0].value === 'open';
    updateReceptionUI(isOpen);
  })
  .catch(() => updateReceptionUI(false));
}

function toggleReception() {
  const newState = !receptionOpen;
  const key = PROJECT_CODE + '_' + MONTH_CODE + '_reception';
  const value = newState ? 'open' : 'closed';
  const headers = {
    'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates',
  };
  fetch(SUPABASE_URL + '/rest/v1/settings', {
    method: 'POST', headers,
    body: JSON.stringify({ key, value }),
  })
  .then(res => {
    if (res.ok || res.status === 409) {
      updateReceptionUI(newState);
      showToast(newState ? '✓ 受付を開始しました' : '✓ 受付を停止しました');
    }
  })
  .catch(() => showToast('エラーが発生しました'));
}

let currentLang = 'ja';
let selected = new Set();
let bookings = [];
let listFilter = 'all';

function t(key) { return I18N[currentLang][key] || I18N.ja[key]; }

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang === 'en' ? 'en' : lang === 'zh' ? 'zh' : 'ja';
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  applyI18n();
  renderEvents();
  renderList();
  renderAdmin();
}

function wd(ev) {
  if (ev.wd === null || ev.wd === undefined) return '';
  return I18N[currentLang].wds[ev.wd];
}

function s(id, val, prop) {
  const el = document.getElementById(id);
  if (!el) return;
  if (prop === 'ph') el.placeholder = val;
  else el.textContent = val;
}

function applyI18n() {
  const L = I18N[currentLang];
  document.title = L.title;
  s('hdr-title', L.title);
  s('hdr-period', L.period);
  s('nav-form', L.nav[0]);
  s('nav-list', L.nav[1]);
  s('nav-admin', L.nav[2]);
  s('sec-select', L.secSelect);
  s('month-label', L.monthLabel);
  s('sel-unit', L.selUnit);
  s('form-sec-title', L.formSecTitle);
  s('lbl-last', L.lblLast + ' *');
  s('lbl-first', L.lblFirst + ' *');
  s('lbl-email', L.lblEmail + ' *');
  s('lbl-lang', L.lblLang);
  s('lbl-role', L.lblRole + ' *');
  s('lbl-tm-count', L.tmCountLabel);
  s('lbl-tm-escort', L.tmEscortLabel);
  s('tmEscort', L.tmEscortPh, 'ph');
  s('lbl-contact', L.lblContact);
  s('contact', L.contactPh, 'ph');
  s('contact-hint', L.contactHint);
  s('lbl-notes', L.lblNotes);
  s('notes', L.notesPh, 'ph');
  s('otherLang', L.langOtherPh, 'ph');
  s('submit-btn', L.submitBtn);
  s('confirm-title', L.confirmTitle);
  s('confirm-note', L.confirmNote);
  s('reset-btn', L.resetBtn);
  s('sec-list-title', L.secListTitle);
  s('sec-admin-title', L.secAdminTitle);
  s('listEmpty', L.listEmpty);
  s('adm-lbl-total', L.admLblTotal);
  s('adm-lbl-other', L.admLblOther);
  s('adm-lbl-ext', L.admLblExt);
  s('dl-btn', L.dlBtn);
  // role select placeholder
  document.querySelector('#role option[value=""]').textContent = L.rolePlaceholder;
  // rebuild lang checkboxes for current language
  const box = document.getElementById('langCheckboxes');
  const checked = [...document.querySelectorAll('input[name="language"]:checked')].map(c => c.value);
  box.innerHTML = '';
  L.langOptions.forEach(opt => {
    const lbl = document.createElement('label');
    lbl.className = 'cb-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.name = 'language'; cb.value = opt.value;
    if (checked.includes(opt.value)) cb.checked = true;
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(' ' + opt.label));
    box.appendChild(lbl);
  });
  // その他 checkbox
  const otherLbl = document.createElement('label');
  otherLbl.className = 'cb-item cb-item-other';
  const otherCb = document.createElement('input');
  otherCb.type = 'checkbox'; otherCb.name = 'language'; otherCb.value = 'その他';
  otherCb.onchange = function(){ toggleOtherLang(this); };
  if (checked.includes('その他')) otherCb.checked = true;
  otherLbl.appendChild(otherCb);
  otherLbl.appendChild(document.createTextNode(' ' + L.langOther));
  box.appendChild(otherLbl);
  // name placeholders
  if (currentLang === 'en') {
    document.getElementById('lastName').placeholder = 'Smith';
    document.getElementById('firstName').placeholder = 'John';
  } else {
    document.getElementById('lastName').placeholder = '山田';
    document.getElementById('firstName').placeholder = '花子';
  }
}

// ── EVENTS ──
function renderEvents() {
  const grid = document.getElementById('grid-main');
  grid.innerHTML = '';
  EVENTS.forEach(ev => {
    const isSel = selected.has(ev.id);
    const wdStr = wd(ev);
    const wdClass = ev.wd === 6 ? 'sat' : ev.wd === 0 ? 'sun' : '';
    const restrictedNote = ev.restricted
      ? `<div style="font-size:0.63rem;color:var(--gold-dark);margin-top:4px;letter-spacing:0.02em;">${t('restricted')}</div>`
      : '';
    const gatherText = ev.gather
      ? `<div style="font-size:0.63rem;color:var(--ink-faint);margin-top:2px;">${ev.gather}</div>`
      : '';
    const card = document.createElement('div');
    card.className = 'event-card' + (isSel ? ' selected' : '');
    card.innerHTML = `
      <div class="event-date-col">
        <div class="event-date-day">${ev.day}</div>
        <div class="event-date-wd ${wdClass}">${wdStr}</div>
      </div>
      <div class="event-body">
        <div class="event-name">${ev.name[currentLang] || ev.name.ja}</div>
        <div class="event-meta">${ev.time}${gatherText}${restrictedNote}</div>
      </div>
      <div class="event-right">
        <div class="check-mark">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>`;
    card.addEventListener('click', () => toggleEvent(ev.id));
    grid.appendChild(card);
  });
  const n = selected.size;
  document.getElementById('selCount').textContent = n;
  document.getElementById('selBreakdown').textContent = '';
  document.getElementById('selSummary').classList.toggle('hidden', n === 0);
}

function toggleEvent(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  renderEvents();
}

function toggleTmCount(sel) {
  const wrap = document.getElementById('tmCountWrap');
  wrap.style.display = TM_ROLES.includes(sel.value) ? 'block' : 'none';
  if (!TM_ROLES.includes(sel.value)) document.getElementById('tmCount').value = '0';
  const escortWrap = document.getElementById('tmEscortWrap');
  escortWrap.style.display = sel.value === 'TM(在日)' ? 'block' : 'none';
  if (sel.value !== 'TM(在日)') document.getElementById('tmEscort').value = '';
}

function toggleOtherLang(cb) {
  const wrap = document.getElementById('otherLangWrap');
  wrap.style.display = cb.checked ? 'block' : 'none';
  if (!cb.checked) document.getElementById('otherLang').value = '';
}

// ── SUBMIT ──
function submitForm() {
  const L = I18N[currentLang];
  if (selected.size === 0) { showErr(L.errSelect); return; }
  const last = document.getElementById('lastName').value.trim();
  const first = document.getElementById('firstName').value.trim();
  const email = document.getElementById('email').value.trim();
  const langChecked = [...document.querySelectorAll('input[name="language"]:checked')].map(c => {
    if (c.value === 'その他') {
      const other = document.getElementById('otherLang').value.trim();
      const lbl = t('langOther');
      return other ? lbl + '（' + other + '）' : lbl;
    }
    return c.value;
  });
  const role = document.getElementById('role').value;
  const tmPrev = TM_ROLES.includes(role) ? parseInt(document.getElementById('tmCount').value || '0', 10) : null;
  const tmEscort = role === 'TM(在日)' ? document.getElementById('tmEscort').value.trim() : '';
  if (!last || !first) { showErr(L.errName); return; }
  if (!email || !email.includes('@')) { showErr(L.errEmail); return; }
  if (langChecked.length === 0) { showErr(L.errLang); return; }
  if (!role) { showErr(L.errRole); return; }
  document.getElementById('errMsg').style.display = 'none';
  const now = new Date();
  const b = {
    id: Date.now(),
    lastName: last, firstName: first,
    name: currentLang === 'en' ? first + ' ' + last : last + ' ' + first,
    email,
    language: langChecked.join('・'),
    role,
    tmPrev,
    tmEscort,
    contact: document.getElementById('contact').value.trim(),
    notes: document.getElementById('notes').value.trim(),
    eventIds: [...selected],
    month: MONTH_CODE,
    at: now.toLocaleString('ja-JP')
  };
  const prevBooking = bookings.find(bk => bk.email === email);
  const isUpdate = !!prevBooking;
  const prevEventIds = isUpdate ? (prevBooking.eventIds || []) : [];
  // 追加・キャンセルの計算
  const addedIds    = b.eventIds.filter(id => !prevEventIds.includes(id));
  const cancelledIds = prevEventIds.filter(id => !b.eventIds.includes(id));
  b.prevEventIds = prevEventIds;
  b.addedIds = addedIds;
  b.cancelledIds = cancelledIds;
  bookings = bookings.filter(bk => bk.email !== email);
  bookings.push(b);
  const evLines = b.eventIds.map(id => {
    const ev = EVENTS.find(e => e.id === id);
    const isAdded = addedIds.includes(id);
    const prefix = isUpdate && isAdded ? '[追加] ' : '';
    return prefix + ev.day + (wd(ev) ? '（' + wd(ev) + '）' : '') + ' ' + (ev.name[currentLang] || ev.name.ja);
  });
  const cancelLines = cancelledIds.map(id => {
    const ev = EVENTS.find(e => e.id === id);
    if (!ev) return null;
    return '[キャンセル] ' + ev.day + (wd(ev) ? '（' + wd(ev) + '）' : '') + ' ' + (ev.name[currentLang] || ev.name.ja);
  }).filter(Boolean);
  saveToDb(b, evLines, isUpdate, cancelledIds, prevEventIds);
  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('confirmBlock').classList.add('vis');
  document.getElementById('confirmName').textContent = b.name + (L.honorific || '');
  document.getElementById('confirmEvents').innerHTML = evLines.map(l => '<div class="confirm-event-item">' + l + '</div>').join('');
  showToast(b.name + L.honorific + '  ' + b.eventIds.length + ' ' + L.toastSuffix);
  sendConfirmEmail(b, evLines, isUpdate);
  renderEvents();
}

function showErr(msg) {
  const e = document.getElementById('errMsg');
  e.textContent = msg; e.style.display = 'block';
}

function resetForm() {
  ['lastName','firstName','email','contact','notes'].forEach(id => document.getElementById(id).value = '');
  document.querySelectorAll('input[name="language"]').forEach(c => c.checked = false);
  document.getElementById('otherLangWrap').style.display = 'none';
  document.getElementById('otherLang').value = '';
  document.getElementById('role').value = '';
  document.getElementById('tmCountWrap').style.display = 'none';
  document.getElementById('tmCount').value = '0';
  document.getElementById('tmEscortWrap').style.display = 'none';
  document.getElementById('tmEscort').value = '';
  document.getElementById('errMsg').style.display = 'none';
  selected = new Set();
  document.getElementById('formWrap').style.display = 'block';
  document.getElementById('confirmBlock').classList.remove('vis');
  renderEvents();
}

// ── LIST ──
const ROLE_ORDER = ['センター','アシスタント','在日','日本人','TM(在日)','TM(日本人)'];
const ROLE_PREFIX = {
  'センター':    'C: ',
  'アシスタント': 'A: ',
  '在日':        '',
  '日本人':      '',
  'TM(在日)':   '',
  'TM(日本人)': '',
};
const TM_ROLES = ['TM(在日)', 'TM(日本人)'];

function sortByRole(list) {
  return [...list].sort((a, b) => {
    const ai = ROLE_ORDER.indexOf(a.role);
    const bi = ROLE_ORDER.indexOf(b.role);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
}

function groupCountLabel(list) {
  const ca = list.filter(b => b.role === 'センター' || b.role === 'アシスタント').length;
  const total = list.length;
  return `C+A: ${ca}名　全員: ${total}名`;
}

function renderList() {
  const filterDiv = document.getElementById('listFilter');
  filterDiv.innerHTML = '<button class="filter-btn' + (listFilter==='all'?' active':'') + '" onclick="setFilter(\'all\')">' + t('filterAll') + '</button>'
    + EVENTS.map(ev =>
        '<button class="filter-btn' + (listFilter===ev.id?' active':'') + '" onclick="setFilter(\'' + ev.id + '\')">'
        + ev.day + '日 ' + (ev.name[currentLang]||ev.name.ja) + '</button>'
      ).join('');

  const wrap = document.getElementById('attList');
  wrap.innerHTML = '';
  const empty = document.getElementById('listEmpty');

  if (!bookings.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  if (listFilter === 'all') {
    EVENTS.forEach(ev => {
      const evB = bookings.filter(b => b.eventIds && b.eventIds.includes(ev.id));
      const evCancelled = bookings.filter(b => (b.cancelledEventIds || []).includes(ev.id));
      if (!evB.length && !evCancelled.length) return;
      const sorted = sortByRole(evB);
      const g = document.createElement('div');
      g.className = 'att-group';
      g.innerHTML = '<div class="att-group-label">'
        + ev.day + (wd(ev) ? '（' + wd(ev) + '）' : '') + ' '
        + (ev.name[currentLang]||ev.name.ja)
        + ' — ' + groupCountLabel(sorted) + '</div>';
      let dispIdx = 0;
      sorted.forEach((b, i) => {
        const evIdx = b.eventIds ? b.eventIds.indexOf(ev.id) : 0;
        b.addedIds = (b.status === '更新' && b.prevEventIds) ? b.eventIds.filter(id => !(b.prevEventIds||[]).includes(id)) : [];
        g.appendChild(makeAttItem(b, dispIdx++, evIdx, ev.id));
      });
      evCancelled.forEach(b => {
        g.appendChild(makeAttItem(b, dispIdx++, 0, ev.id));
      });
      wrap.appendChild(g);
    });
    const legacy = bookings.filter(b => !b.eventIds || !b.eventIds.length);
    if (legacy.length) {
      const g = document.createElement('div');
      g.className = 'att-group';
      g.innerHTML = '<div class="att-group-label">その他 — ' + legacy.length + '名</div>';
      legacy.forEach((b, i) => g.appendChild(makeAttItem(b, i)));
      wrap.appendChild(g);
    }
  } else {
    const filtered = bookings.filter(b => b.eventIds && b.eventIds.includes(listFilter));
    if (!filtered.length) { empty.style.display = 'block'; return; }
    const sorted = sortByRole(filtered);
    const cancelled = bookings.filter(b => (b.cancelledEventIds || []).includes(listFilter));
    const countDiv = document.createElement('div');
    countDiv.style.cssText = 'font-size:0.72rem;color:var(--ink-mid);margin-bottom:10px;letter-spacing:0.06em;';
    countDiv.textContent = groupCountLabel(sorted);
    wrap.appendChild(countDiv);
    let dispIdx = 0;
    sorted.forEach((b, i) => {
      const evIdx = b.eventIds ? b.eventIds.indexOf(listFilter) : 0;
      b.addedIds = (b.status === '更新' && b.prevEventIds) ? b.eventIds.filter(id => !(b.prevEventIds||[]).includes(id)) : [];
      wrap.appendChild(makeAttItem(b, dispIdx++, evIdx, listFilter));
    });
    cancelled.forEach(b => {
      wrap.appendChild(makeAttItem(b, dispIdx++, 0, listFilter));
    });
  }
}

const LANG_ABBR = {
  '日本語':     '日',
  '英語':       '英',
  '中国語':     '中',
  '韓国語':     '韓',
  '広東語':     '広',
  'ポルトガル語': 'ポ',
  'スペイン語':  'ス',
  'フランス語':  'フ',
};

function langTag(langStr) {
  if (!langStr) return '';
  const codes = langStr.split('・').map(l => LANG_ABBR[l] || '他').join('');
  return codes ? ' [' + codes + ']' : '';
}

function makeAttItem(b, i, evIndex, evId) {
  const prefix = ROLE_PREFIX[b.role] !== undefined ? ROLE_PREFIX[b.role] : '';
  let displayName = prefix + b.name + langTag(b.language);
  if (TM_ROLES.includes(b.role) && b.tmPrev !== null && b.tmPrev !== undefined && evIndex !== undefined) {
    const count = b.tmPrev + evIndex + 1;
    if (b.role === 'TM(在日)' && b.tmEscort) {
      displayName += ' (TM' + count + '回目、付き添い:' + b.tmEscort + ')';
    } else {
      displayName += ' (TM' + count + '回目)';
    }
  } else if (b.role === 'TM(在日)' && b.tmEscort) {
    displayName += ' (付き添い:' + b.tmEscort + ')';
  }
  // 追加・キャンセルの判定
  const isAdded     = evId && b.status === '更新' && (b.addedIds || []).includes(evId);
  const isCancelled = evId && (b.cancelledEventIds || []).includes(evId);
  const init = (b.name||'').slice(0,1);
  const d = document.createElement('div');
  d.className = 'attendee-item';
  const notesHtml = b.notes
    ? `<div class="att-sub" style="font-size:0.68rem;color:var(--ink-faint);margin-top:2px;">💬 ${b.notes}</div>`
    : '';
  let nameStyle = '';
  let badge = '';
  if (isCancelled) {
    nameStyle = 'color:#8b3a3a;text-decoration:line-through;';
    badge = '<span style="font-size:0.62rem;color:#8b3a3a;margin-left:4px;">✕キャンセル</span>';
  } else if (isAdded) {
    nameStyle = 'color:#2a5ea8;';
    badge = '<span style="font-size:0.62rem;color:#2a5ea8;margin-left:4px;">＋追加</span>';
  }
  d.innerHTML = `<div class="att-num">${isCancelled ? '－' : i+1}</div>
    <div class="att-avatar" style="${isCancelled ? 'opacity:0.4;' : ''}">${init}</div>
    <div class="att-info">
      <div class="att-name" style="${nameStyle}">${displayName}${badge}</div>
      ${notesHtml}
    </div>`;
  return d;
}

function downloadExcel() {
  if (!bookings.length) { alert('立願データがありません'); return; }

  const wb = XLSX.utils.book_new();
  const ws_data = [];
  const merges = [];

  // 言語略称（[]なし）
  function langShort(langStr) {
    if (!langStr) return '';
    return langStr.split('・').map(l => LANG_ABBR[l] || '他').join('');
  }

  // 役割表示（センター→C、アシスタント→A、TM系→回数付き）
  function roleShort(b, evId) {
    if (b.role === 'センター') return 'センター';
    if (b.role === 'アシスタント') return 'アシスタント';
    if (b.role === '在日') return '';
    if (b.role === '日本人') return '';
    if (TM_ROLES.includes(b.role) && b.tmPrev !== null && b.tmPrev !== undefined) {
      const evIdx = b.eventIds ? b.eventIds.indexOf(evId) : 0;
      return 'TM' + (b.tmPrev + evIdx + 1) + '回目';
    }
    return b.role || '';
  }

  // 備考（ご伝言・付き添い）
  function getBiko(b) {
    const parts = [];
    if (b.role === 'TM(在日)' && b.tmEscort) parts.push('付き添い:' + b.tmEscort);
    if (b.notes) parts.push(b.notes);
    return parts.join('、');
  }

  // ヘッダー行
  ws_data.push(['法要', '人数', '役割', '氏名', '言語', '連絡担当', '備考']);

  let currentRow = 1; // 0-indexed、ヘッダーが0行目
  const groupStartRows = []; // 各法要の開始行（太線を引く境界）

  EVENTS.forEach(ev => {
    const evB = sortByRole(bookings.filter(b => b.eventIds && b.eventIds.includes(ev.id)));
    const evLabel = ev.day + '（' + (wd(ev)||'') + '） ' + (ev.name[currentLang]||ev.name.ja);
    const ca = evB.filter(b => b.role === 'センター' || b.role === 'アシスタント').length;
    const countLabel = 'C+A: ' + ca + ' / 全: ' + evB.length;
    const rowCount = Math.max(evB.length, 1);

    groupStartRows.push(currentRow); // この法要の先頭行を記録

    // キャンセル行
    const evCancelledExcel = bookings.filter(b => (b.cancelledEventIds || []).includes(ev.id));
    if (evB.length === 0 && evCancelledExcel.length === 0) {
      ws_data.push({ cells: [evLabel, countLabel, '', '', '', '', ''], isAdded: false, isCancelled: false });
      currentRow++;
    } else {
      evB.forEach((b, i) => {
        const isAdded     = b.status === '更新' && (b.prevEventIds || []).length > 0 && !(b.prevEventIds || []).includes(ev.id);
        const isCancelled = (b.cancelledEventIds || []).includes(ev.id);
        ws_data.push({
          cells: [
            i === 0 ? evLabel : '',
            i === 0 ? countLabel : '',
            roleShort(b, ev.id),
            b.name,
            langShort(b.language),
            b.contact || '',
            getBiko(b),
          ],
          isAdded,
          isCancelled,
        });
      });

      // 法要・人数セルを結合
      if (rowCount > 1) {
        merges.push({ s:{r:currentRow, c:0}, e:{r:currentRow+rowCount-1, c:0} });
        merges.push({ s:{r:currentRow, c:1}, e:{r:currentRow+rowCount-1, c:1} });
      }
      // キャンセル行を末尾に追加
      evCancelledExcel.forEach(b => {
        ws_data.push({
          cells: ['', '', roleShort(b, ev.id), b.name, langShort(b.language), b.contact || '', getBiko(b)],
          isAdded: false, isCancelled: true,
        });
        currentRow++;
      });
      currentRow += rowCount;
    }
  });

  const totalRows = currentRow;

  // ws_dataをaoa形式に変換
  const ws_aoa = ws_data.map(r => Array.isArray(r) ? r : r.cells);
  const ws = XLSX.utils.aoa_to_sheet(ws_aoa);
  ws['!merges'] = merges;

  // ヘッダー行を固定（XMLを直接注入）
  ws['!freeze'] = { xSplit: 0, ySplit: 1 };
  // xlsx-js-styleはsheetViewsをXMLとして直接設定
  if (!ws['!xml']) ws['!xml'] = {};
  ws['!sheetView'] = '<sheetView tabSelected="1" workbookViewId="0"><pane ySplit="1" topLeftCell="A2" activePane="bottomLeft" state="frozen"/><selection pane="bottomLeft"/></sheetView>';

  // 列幅
  ws['!cols'] = [
    { wch: 32 }, // 法要
    { wch: 14 }, // 人数
    { wch: 12 }, // 役割
    { wch: 14 }, // 氏名
    { wch: 10 }, // 言語
    { wch: 10 }, // 連絡担当
    { wch: 24 }, // 備考
  ];

  // 罫線定義
  const thin   = { style: 'thin',   color: { rgb: 'AAAAAA' } };
  const thick  = { style: 'medium', color: { rgb: '555555' } };
  const NCOLS  = 7;

  // 全セルにスタイル適用
  const fullRange = XLSX.utils.decode_range(ws['!ref'] || 'A1');
  for (let R = fullRange.s.r; R <= fullRange.e.r; R++) {
    const isHeader    = R === 0;
    const isGroupTop  = groupStartRows.includes(R);
    const isLastRow   = R === totalRows - 1;
    const rowMeta     = ws_data[R];
    const isAdded     = rowMeta && !Array.isArray(rowMeta) && rowMeta.isAdded;
    const isCancelled = rowMeta && !Array.isArray(rowMeta) && rowMeta.isCancelled;

    for (let C = 0; C < NCOLS; C++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      if (!ws[addr]) ws[addr] = { t: 's', v: '' };

      const isFirstCol = C === 0;
      const isLastCol  = C === NCOLS - 1;

      let fontColor = '000000';
      if (isHeader) fontColor = INK;
      else if (isCancelled) fontColor = '8B3A3A';
      else if (isAdded) fontColor = '2A5EA8';

      ws[addr].s = {
        font: {
          name: 'Meiryo UI',
          bold: isHeader,
          sz: 10,
          color: { rgb: fontColor },
          strike: isCancelled,
        },
        alignment: { vertical: 'top', wrapText: true },
        fill: isHeader
          ? { fgColor: { rgb: 'F0EBE3' }, patternType: 'solid' }
          : { patternType: 'none' },
        border: {
          top:    isHeader || isGroupTop ? thick : thin,
          bottom: isLastRow              ? thick : thin,
          left:   isFirstCol             ? thick : thin,
          right:  isLastCol              ? thick : thin,
        },
      };
    }
  }

  XLSX.utils.book_append_sheet(wb, ws, 'ご奉仕者一覧');
  const now = new Date();
  const fname = 'GLAD_ogen_' + now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2) + '.xlsx';
  XLSX.writeFile(wb, fname);
}

// SHA-256ハッシュ
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// DBからパスワードハッシュを取得（なければデフォルトを初期化）
async function getStoredHash() {
  const res = await fetch(SUPABASE_URL + '/rest/v1/settings?key=eq.' + encodeURIComponent(ADMIN_PW_KEY) + '&select=value', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY },
  });
  const rows = await res.json();
  if (Array.isArray(rows) && rows.length > 0) return rows[0].value;
  // 初回：admin1234をハッシュ化して保存
  const defaultHash = await sha256('admin1234');
  await fetch(SUPABASE_URL + '/rest/v1/settings', {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates',
    },
    body: JSON.stringify({ key: ADMIN_PW_KEY, value: defaultHash }),
  });
  return defaultHash;
}

async function confirmAdminLogin() {
  const btn = document.getElementById('overlay-ok');

  try {
    if (currentLoginTab === 'pw') {
      // 通常パスワードログイン（SHA-256照合）

      if (res.ok && data.access_token && email === SUPER_USER_EMAIL) {
        isAdminAuthed = true;
        isSuperUser = true;
        document.getElementById('adminOverlay').classList.remove('open');
        document.getElementById('admin-user-label').textContent = email;

        document.getElementById('adminSuPwInput').value = '';

    document.getElementById('overlay-err').textContent = 'エラーが発生しました';

  const res = await fetch(SUPABASE_URL + '/rest/v1/settings', {

      'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,

function loadFromDb() {
  fetch(SUPABASE_URL + '/rest/v1/reservations?select=*&month=eq.' + MONTH_CODE + '&order=at.asc', {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
    },
  })
  .then(r => r.json())
  .then(rows => {
    if (!Array.isArray(rows)) return;
    bookings = rows.map(r => {
      let eventIds = [];
      try { eventIds = r.event_ids ? JSON.parse(r.event_ids) : []; } catch(e) {}
      let prevEventIds = [];
      let cancelledEventIds = [];
      try { prevEventIds = r.prev_event_ids ? JSON.parse(r.prev_event_ids) : []; } catch(e) {}
      try { cancelledEventIds = r.cancelled_event_ids ? JSON.parse(r.cancelled_event_ids) : []; } catch(e) {}
      return {
        id:               r.id || Date.now(),
        name:             r.name || '',
        email:            r.email || '',
        language:         r.language || '',
        role:             r.role || '',
        tmPrev:           r.tm_prev !== null && r.tm_prev !== undefined ? parseInt(r.tm_prev, 10) : null,
        tmEscort:         r.tm_escort || '',
        contact:          r.contact || '',
        notes:            r.notes || '',
        events:           r.events || '',
        eventIds:         eventIds,
        prevEventIds:     prevEventIds,
        cancelledEventIds: cancelledEventIds,
        at:               r.at || '',
        status:           r.status || '新規',
      };
    });
    renderList();
    renderAdmin();
    console.log('Supabase: loaded ' + bookings.length + ' bookings. [' + PROJECT_CODE + ']');
  })
  .catch(err => {
    console.warn('Supabase load error:', err);
  });
}

  applyI18n();
  renderEvents();
  loadFromDb();
