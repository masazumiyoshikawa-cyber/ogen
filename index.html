<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLAD ご奉仕立願</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&family=Noto+Serif+SC:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
/* ═══════════════════════════════════════
   BASE
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#f7f4ef;--paper-warm:#ede8df;--card:#fff;
  --ink:#2a2520;--ink-mid:#6b6058;--ink-faint:#a89f96;
  --border:rgba(42,37,32,0.1);--border-mid:rgba(42,37,32,0.18);
  --gold:#8b7355;--gold-light:#e8dece;--gold-dark:#6b5840;
  --danger:#8b3a3a;--added:#2a5ea8;--radius:2px;
}
body{font-family:'Noto Sans JP','Noto Sans SC',sans-serif;font-weight:300;background:var(--paper);color:var(--ink);min-height:100vh;line-height:1.8;}

/* ═══════════════════════════════════════
   HEADER / NAV
═══════════════════════════════════════ */
.lang-bar{background:rgba(0,0,0,0.25);display:flex;justify-content:flex-end;padding:6px 1.5rem;gap:4px;}
.lang-btn{padding:3px 10px;background:none;border:1px solid rgba(255,255,255,0.25);border-radius:1px;color:rgba(255,255,255,0.5);font-size:0.68rem;cursor:pointer;letter-spacing:0.06em;transition:all 0.18s;font-family:inherit;}
.lang-btn:hover{border-color:rgba(255,255,255,0.55);color:rgba(255,255,255,0.8);}
.lang-btn.active{border-color:var(--gold);color:var(--gold-light);background:rgba(139,115,85,0.18);}

header{background:var(--ink);padding:1.5rem 2rem 1.75rem;text-align:center;}
.header-mon{width:44px;height:44px;margin:0 auto 1rem;display:block;}
header h1{font-family:'Noto Serif JP','Noto Serif SC',serif;font-weight:400;font-size:clamp(1rem,3vw,1.35rem);color:rgba(255,255,255,0.88);letter-spacing:0.25em;margin-bottom:0.3rem;}
.header-sub{font-size:0.72rem;color:rgba(255,255,255,0.38);letter-spacing:0.18em;}
.header-period{margin-top:0.9rem;font-size:0.78rem;color:rgba(200,175,130,0.8);letter-spacing:0.15em;font-family:'Noto Serif JP','Noto Serif SC',serif;}

nav{background:var(--ink);border-top:1px solid rgba(255,255,255,0.07);display:flex;justify-content:center;}
.nav-item{padding:0.7rem 1.8rem;font-size:0.72rem;color:rgba(255,255,255,0.38);cursor:pointer;letter-spacing:0.15em;border-bottom:1.5px solid transparent;transition:all 0.2s;}
.nav-item:hover{color:rgba(255,255,255,0.65);}
.nav-item.active{color:rgba(200,175,130,0.9);border-bottom-color:var(--gold);}

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
.panel{display:none;}.panel.active{display:block;}
.wrap{max-width:860px;margin:0 auto;padding:2.5rem 1.5rem;box-sizing:border-box;width:100%;}
.sec-head{text-align:center;margin-bottom:2rem;}
.sec-title{font-family:'Noto Serif JP','Noto Serif SC',serif;font-weight:400;font-size:0.95rem;letter-spacing:0.22em;color:var(--ink);margin-bottom:0.7rem;}
.sec-rule{height:1px;background:var(--border-mid);position:relative;margin:0 auto;max-width:220px;}
.sec-rule::after{content:'◆';position:absolute;left:50%;transform:translateX(-50%) translateY(-50%);background:var(--paper);padding:0 8px;font-size:7px;color:var(--gold);}
.month-label{font-size:0.7rem;color:var(--ink-faint);letter-spacing:0.12em;margin-bottom:0.75rem;padding-left:2px;}
.empty{text-align:center;padding:3rem;color:var(--ink-faint);font-size:0.78rem;letter-spacing:0.12em;}

/* ═══════════════════════════════════════
   EVENT CARDS
═══════════════════════════════════════ */
.events-grid{display:flex;flex-direction:column;gap:7px;margin-bottom:1.75rem;}
.event-card{display:flex;align-items:stretch;background:var(--card);border:1px solid var(--border-mid);border-radius:var(--radius);cursor:pointer;transition:border-color 0.18s,background 0.18s;overflow:hidden;min-width:0;}
.event-card:hover{border-color:var(--gold);}
.event-card.selected{border-color:var(--gold);background:var(--gold-light);}
.event-date-col{width:58px;flex-shrink:0;background:var(--paper-warm);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;border-right:1px solid var(--border);transition:background 0.18s;}
.event-card.selected .event-date-col{background:rgba(139,115,85,0.14);}
.event-date-day{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:1.35rem;line-height:1;color:var(--ink);}
.event-date-wd{font-size:0.6rem;color:var(--ink-faint);letter-spacing:0.06em;margin-top:3px;}
.event-date-wd.sat{color:#4a6080;}.event-date-wd.sun{color:#7a3a30;}
.event-body{flex:1;padding:10px 13px;min-width:0;}
.event-name{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.88rem;color:var(--ink);letter-spacing:0.06em;line-height:1.6;}
.event-meta{font-size:0.7rem;color:var(--ink-mid);margin-top:3px;}
.event-right{display:flex;align-items:center;padding:10px 13px;flex-shrink:0;}
.check-mark{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--border-mid);display:flex;align-items:center;justify-content:center;transition:all 0.18s;}
.event-card.selected .check-mark{background:var(--gold);border-color:var(--gold);}
.check-mark svg{opacity:0;transition:opacity 0.15s;}
.event-card.past{opacity:0.38;cursor:not-allowed;pointer-events:none;}
.event-card.past .event-date-col{background:var(--paper-warm);}
.event-card.past .check-mark{display:none;}

.sel-summary{background:var(--ink);color:rgba(255,255,255,0.78);padding:11px 16px;border-radius:var(--radius);font-size:0.76rem;letter-spacing:0.06em;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.sel-summary.hidden{display:none;}
.sel-count em{font-style:normal;font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:1.05rem;color:rgba(200,175,130,0.9);}

/* ═══════════════════════════════════════
   FORM
═══════════════════════════════════════ */
.form-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;}
.form-section-title{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.75rem;color:var(--ink-mid);letter-spacing:0.15em;margin-bottom:1.1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:0.72rem;color:var(--ink-mid);letter-spacing:0.08em;margin-bottom:5px;}
input[type=text],input[type=email],input[type=number],select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--paper);color:var(--ink);font-family:'Noto Sans JP','Noto Sans SC',sans-serif;font-weight:300;font-size:0.85rem;transition:border-color 0.2s,box-shadow 0.2s;outline:none;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(139,115,85,0.1);background:var(--card);}
textarea{resize:vertical;min-height:68px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.checkbox-group{display:flex;flex-wrap:wrap;gap:6px 12px;padding:4px 0;}
.cb-item{display:flex;align-items:center;gap:5px;font-size:0.82rem;color:var(--ink);cursor:pointer;letter-spacing:0.04em;}
.cb-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--gold);cursor:pointer;flex-shrink:0;}
.err{color:var(--danger);font-size:0.75rem;margin-bottom:10px;display:none;}
.submit-btn{width:100%;padding:13px;background:var(--ink);color:rgba(255,255,255,0.85);border:none;border-radius:var(--radius);font-family:'Noto Serif JP','Noto Serif SC',serif;font-weight:400;font-size:0.85rem;letter-spacing:0.2em;cursor:pointer;transition:background 0.2s;}
.submit-btn:hover{background:#3d3530;}

/* ═══════════════════════════════════════
   CONFIRM
═══════════════════════════════════════ */
.confirm-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;text-align:center;display:none;}
.confirm-block.vis{display:block;}
.confirm-icon{width:40px;height:40px;margin:0 auto 1rem;}
.confirm-title{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.95rem;letter-spacing:0.18em;margin-bottom:0.5rem;}
.confirm-name{font-size:0.82rem;color:var(--ink-mid);}
.confirm-events{margin-top:1rem;text-align:left;background:var(--paper-warm);padding:12px 16px;border-radius:var(--radius);}
.confirm-event-item{font-size:0.76rem;color:var(--ink-mid);padding:3px 0;letter-spacing:0.04em;}
.confirm-event-item::before{content:'◇ ';color:var(--gold);}
.reset-btn{margin-top:1.5rem;padding:8px 24px;background:none;border:1px solid var(--border-mid);border-radius:var(--radius);cursor:pointer;font-family:'Noto Sans JP','Noto Sans SC',sans-serif;font-size:0.75rem;letter-spacing:0.1em;color:var(--ink-mid);transition:border-color 0.2s;}
.reset-btn:hover{border-color:var(--gold);}

/* ═══════════════════════════════════════
   VOLUNTEER LIST
═══════════════════════════════════════ */
.list-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem;}
.filter-btn{padding:5px 13px;border:1px solid var(--border-mid);border-radius:var(--radius);background:none;font-family:'Noto Sans JP','Noto Sans SC',sans-serif;font-size:0.7rem;letter-spacing:0.06em;color:var(--ink-mid);cursor:pointer;transition:all 0.18s;}
.filter-btn:hover{border-color:var(--gold);}
.filter-btn.active{background:var(--ink);color:rgba(255,255,255,0.8);border-color:var(--ink);}
.att-group{margin-bottom:1.5rem;}
.att-group-label{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.78rem;color:var(--ink-mid);letter-spacing:0.12em;padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.attendee-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);}
.att-num{font-size:0.68rem;color:var(--ink-faint);min-width:18px;text-align:right;}
.att-avatar{width:30px;height:30px;border-radius:50%;background:var(--gold-light);color:var(--gold-dark);display:flex;align-items:center;justify-content:center;font-size:0.68rem;flex-shrink:0;}
.att-info{flex:1;min-width:0;}
.att-name{font-size:0.85rem;}
.att-sub{font-size:0.68rem;color:var(--ink-faint);}

/* ═══════════════════════════════════════
   ADMIN
═══════════════════════════════════════ */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:2rem;}
.stat{background:var(--card);border:1px solid var(--border);padding:1rem;text-align:center;}
.stat-n{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:1.8rem;color:var(--ink);line-height:1;}
.stat-l{font-size:0.65rem;color:var(--ink-faint);letter-spacing:0.08em;margin-top:4px;}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:0.78rem;}
th{text-align:left;padding:7px 10px;font-size:0.65rem;letter-spacing:0.08em;color:var(--ink-faint);border-bottom:1px solid var(--border-mid);font-weight:400;white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
tr:hover td{background:var(--paper-warm);}
.del-btn{background:none;border:1px solid rgba(139,58,58,0.3);color:var(--danger);padding:3px 9px;border-radius:1px;font-size:0.65rem;cursor:pointer;font-family:inherit;letter-spacing:0.04em;transition:all 0.18s;}
.del-btn:hover{background:rgba(139,58,58,0.07);}

/* ═══════════════════════════════════════
   OVERLAYS & TOAST
═══════════════════════════════════════ */
#adminOverlay{display:none;}
#adminOverlay.open{display:flex;align-items:center;justify-content:center;}

/* Confirmation modal */
#confirmModal{display:none;position:fixed;inset:0;background:rgba(26,22,18,0.65);z-index:300;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;overflow-y:auto;}
#confirmModal.open{display:flex;}
.cmod-box{background:var(--card);border-radius:var(--radius);width:100%;max-width:560px;overflow:hidden;margin:auto;}
.cmod-head{background:var(--ink);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:12px;}
.cmod-head-icon{width:28px;height:28px;flex-shrink:0;}
.cmod-head-title{font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.88rem;letter-spacing:0.18em;color:rgba(255,255,255,0.88);}
.cmod-head-sub{font-size:0.68rem;color:rgba(200,175,130,0.8);margin-top:2px;letter-spacing:0.08em;}
.cmod-body{padding:1.25rem 1.5rem;}
.cmod-section{margin-bottom:1.1rem;}
.cmod-section-label{font-size:0.65rem;color:var(--ink-faint);letter-spacing:0.14em;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.cmod-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:0.8rem;align-items:baseline;}
.cmod-row:last-child{border-bottom:none;}
.cmod-row-label{color:var(--ink-mid);font-size:0.7rem;min-width:80px;flex-shrink:0;letter-spacing:0.04em;}
.cmod-row-val{color:var(--ink);flex:1;}
.cmod-ev{display:flex;align-items:baseline;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);font-size:0.8rem;}
.cmod-ev:last-child{border-bottom:none;}
.cmod-badge{font-size:0.6rem;padding:1px 5px;border-radius:1px;flex-shrink:0;letter-spacing:0.04em;}
.cmod-badge.added{background:rgba(42,94,168,0.12);color:var(--added);}
.cmod-badge.cancelled{background:rgba(139,58,58,0.1);color:var(--danger);text-decoration:line-through;}
.cmod-badge.past{background:rgba(168,159,150,0.15);color:var(--ink-faint);}
.cmod-badge.normal{background:rgba(139,115,85,0.1);color:var(--gold-dark);}
.cmod-ev-name.past{color:var(--ink-faint);}
.cmod-ev-name.cancelled{color:var(--danger);text-decoration:line-through;}
.cmod-ev-name.added{color:var(--added);}
.cmod-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:10px;}
.cmod-footer button{flex:1;padding:11px;border-radius:var(--radius);cursor:pointer;font-family:'Noto Serif JP','Noto Serif SC',serif;font-size:0.8rem;letter-spacing:0.12em;transition:all 0.2s;}
.cmod-btn-cancel{background:none;border:1px solid var(--border-mid);color:var(--ink-mid);}
.cmod-btn-cancel:hover{border-color:var(--gold);color:var(--ink);}
.cmod-btn-ok{background:var(--ink);border:none;color:rgba(255,255,255,0.88);}
.cmod-btn-ok:hover{background:#3d3530;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);color:rgba(255,255,255,0.82);padding:11px 16px;border-radius:var(--radius);font-size:0.75rem;letter-spacing:0.06em;box-shadow:0 6px 24px rgba(0,0,0,0.2);display:flex;align-items:center;gap:9px;transform:translateY(60px);opacity:0;transition:all 0.3s cubic-bezier(.34,1.56,.64,1);z-index:999;max-width:300px;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;pointer-events:auto;}
.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;}

/* ═══════════════════════════════════════
   MOBILE  (max-width: 600px)
═══════════════════════════════════════ */
@media(max-width:600px){
  .lang-bar{padding:6px 1rem;}
  .lang-btn{padding:4px 10px;font-size:0.7rem;}
  header{padding:1.25rem 1rem 1.5rem;}
  .header-mon{width:36px;height:36px;margin-bottom:0.75rem;}
  header h1{font-size:0.95rem;letter-spacing:0.1em;}
  .header-sub{font-size:0.68rem;}
  .header-period{font-size:0.72rem;}
  nav{justify-content:stretch;}
  .nav-item{flex:1;text-align:center;padding:0.75rem 0.25rem;font-size:0.65rem;letter-spacing:0.04em;}
  .wrap{padding:1.25rem 0.85rem;}
  .sec-title{font-size:0.85rem;letter-spacing:0.1em;}
  .month-label{font-size:0.65rem;}
  .event-date-col{width:48px;}
  .event-date-day{font-size:1.1rem;}
  .event-body{padding:8px 8px;}
  .event-name{font-size:0.78rem;letter-spacing:0.02em;}
  .event-meta{font-size:0.64rem;}
  .event-right{padding:8px 8px;}
  .check-mark{width:17px;height:17px;}
  .sel-summary{flex-direction:column;align-items:flex-start;gap:4px;padding:10px 12px;}
  .form-section{padding:1rem 0.85rem;}
  .form-row{grid-template-columns:1fr;}
  .form-group{margin-bottom:0.85rem;}
  label{font-size:0.7rem;}
  input[type=text],input[type=email],input[type=number],select,textarea{font-size:1rem;padding:8px 10px;}
  .checkbox-group{gap:5px 10px;}
  .cb-item{font-size:0.8rem;}
  .submit-btn{font-size:0.82rem;padding:15px;letter-spacing:0.1em;}
  .confirm-block{padding:1.75rem 1rem;}
  .confirm-event-item{font-size:0.72rem;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .stat-n{font-size:1.5rem;}
  .tbl-wrap{margin:0 -0.85rem;padding:0 0.85rem;}
  table{font-size:0.68rem;min-width:700px;}
  th,td{padding:5px 7px;}
  .list-filter{gap:4px;}
  .filter-btn{padding:4px 8px;font-size:0.64rem;}
  .att-group-label{font-size:0.72rem;}
  .attendee-item{gap:8px;padding:8px 0;}
  .att-avatar{width:26px;height:26px;font-size:0.62rem;}
  .att-name{font-size:0.8rem;}
  .toast{left:1rem;right:1rem;bottom:1rem;max-width:none;}
  #adminOverlay > div{width:calc(100% - 2rem);padding:1.5rem 1rem;}
}
</style>
</head>
<body>

<!-- LANGUAGE BAR -->
<div style="background:var(--ink);">
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('ja')">日本語</button>
    <button class="lang-btn" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <svg class="header-mon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="20" stroke="rgba(200,175,130,0.45)" stroke-width="0.7"/>
    <circle cx="22" cy="22" r="14" stroke="rgba(200,175,130,0.45)" stroke-width="0.7"/>
    <circle cx="22" cy="22" r="3.5" fill="rgba(200,175,130,0.55)"/>
    <line x1="22" y1="2"  x2="22" y2="8"  stroke="rgba(200,175,130,0.55)" stroke-width="0.9"/>
    <line x1="22" y1="36" x2="22" y2="42" stroke="rgba(200,175,130,0.55)" stroke-width="0.9"/>
    <line x1="2"  y1="22" x2="8"  y2="22" stroke="rgba(200,175,130,0.55)" stroke-width="0.9"/>
    <line x1="36" y1="22" x2="42" y2="22" stroke="rgba(200,175,130,0.55)" stroke-width="0.9"/>
    <line x1="6"    y1="6"    x2="9.9"  y2="9.9"  stroke="rgba(200,175,130,0.35)" stroke-width="0.9"/>
    <line x1="34.1" y1="34.1" x2="38"   y2="38"   stroke="rgba(200,175,130,0.35)" stroke-width="0.9"/>
    <line x1="6"    y1="38"   x2="9.9"  y2="34.1" stroke="rgba(200,175,130,0.35)" stroke-width="0.9"/>
    <line x1="34.1" y1="9.9"  x2="38"   y2="6"    stroke="rgba(200,175,130,0.35)" stroke-width="0.9"/>
  </svg>
  <h1 id="hdr-title"></h1>
  <div class="header-sub">応現院</div>
  <div class="header-period" id="hdr-period"></div>
</header>

<!-- NAV -->
<nav>
  <div class="nav-item active" onclick="switchTab('form')"  id="nav-form"></div>
  <div class="nav-item"        onclick="switchTab('list')"  id="nav-list"></div>
  <div class="nav-item"        onclick="switchTab('admin')" id="nav-admin"></div>
</nav>

<!-- ADMIN LOGIN OVERLAY -->
<div id="adminOverlay" style="position:fixed;inset:0;background:rgba(26,22,18,0.7);z-index:200;">
  <div style="background:var(--card);border:1px solid var(--border-mid);border-radius:var(--radius);padding:2rem 1.75rem 1.75rem;width:min(340px,calc(100vw - 2rem));text-align:center;box-sizing:border-box;">

const ROLE_ORDER  = ['センター','アシスタント','在日','日本人','TM(在日)','TM(日本人)'];
const ROLE_PREFIX = {'センター':'C: ','アシスタント':'A: ','在日':'','日本人':'','TM(在日)':'','TM(日本人)':''};

const LANG_ABBR   = {'日本語':'日','英語':'英','中国語':'中','韓国語':'韓','広東語':'広','ポルトガル語':'ポ','スペイン語':'ス','フランス語':'フ'};

const L = () => I18N[currentLang];
const t = key => L()[key] || I18N.ja[key];

function setEl(id, val, prop) {
  const el = document.getElementById(id);
  if (!el) return;
  if (prop === 'ph') el.placeholder = val;
  else el.textContent = val;
}

function weekdayStr(ev) {
  if (ev.wd == null) return '';
  return L().wds[ev.wd];
}

function langTag(langStr) {
  if (!langStr) return '';
  const codes = langStr.split('・').map(l => LANG_ABBR[l] || '他').join('');
  return codes ? ' [' + codes + ']' : '';
}

function sortByRole(list) {
  return [...list].sort((a, b) => {
    const ai = ROLE_ORDER.indexOf(a.role);
    const bi = ROLE_ORDER.indexOf(b.role);
    return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
  });
}

function groupCountLabel(list) {
  const ca = list.filter(b => b.role === 'センター' || b.role === 'アシスタント').length;
  return `C+A: ${ca}名　全員: ${list.length}名`;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function applyI18n() {
  const l = L();
  document.title = l.title;
  document.documentElement.lang = currentLang === 'en' ? 'en' : currentLang === 'zh' ? 'zh' : 'ja';
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${currentLang}')"]`).classList.add('active');

  ['hdr-title',l.title,'hdr-period',l.period,'nav-form',l.nav[0],'nav-list',l.nav[1],'nav-admin',l.nav[2],
   'sec-select',l.secSelect,'month-label',l.monthLabel,'sel-unit',l.selUnit,'form-sec-title',l.formSecTitle,
   'lbl-last',l.lblLast+' *','lbl-first',l.lblFirst+' *','lbl-email',l.lblEmail+' *',
   'lbl-lang',l.lblLang,'lbl-role',l.lblRole+' *',
   'lbl-tm-count',l.tmCountLabel,'lbl-tm-escort',l.tmEscortLabel,
   'lbl-contact',l.lblContact,'contact-hint',l.contactHint,'lbl-notes',l.lblNotes,
   'submit-btn',l.submitBtn,'confirm-title',l.confirmTitle,'confirm-note',l.confirmNote,
   'reset-btn',l.resetBtn,'sec-list-title',l.secListTitle,'sec-admin-title',l.secAdminTitle,
   'listEmpty',l.listEmpty,'adm-lbl-total',l.admLblTotal,'adm-lbl-other',l.admLblOther,
   'adm-lbl-ext',l.admLblExt,'dl-btn',l.dlBtn,
  ].reduce((_, v, i, arr) => i % 2 === 0 ? v : (setEl(arr[i-1], v), null), null);

  setEl('tmEscort',  l.tmEscortPh, 'ph');
  setEl('contact',   l.contactPh,  'ph');
  setEl('notes',     l.notesPh,    'ph');
  setEl('otherLang', l.langOtherPh,'ph');
  document.querySelector('#role option[value=""]').textContent = l.rolePlaceholder;
  document.getElementById('lastName').placeholder  = currentLang === 'en' ? 'Smith' : '山田';
  document.getElementById('firstName').placeholder = currentLang === 'en' ? 'John'  : '花子';

  // Rebuild language checkboxes
  const box     = document.getElementById('langCheckboxes');
  const checked = [...document.querySelectorAll('input[name="language"]:checked')].map(c => c.value);
  box.innerHTML = '';
  [...l.langOptions, {value:'その他', label:l.langOther}].forEach(opt => {
    const lbl = document.createElement('label');
    lbl.className = 'cb-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.name = 'language'; cb.value = opt.value;
    if (checked.includes(opt.value)) cb.checked = true;
    if (opt.value === 'その他') cb.onchange = () => onOtherLangToggle(cb);
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(' ' + opt.label));
    box.appendChild(lbl);
  });
}

function setLang(lang) {
  currentLang = lang;
  applyI18n();
  renderEvents();
  renderList();
  renderAdmin();
}

function switchTab(tab) {
  if ((tab === 'list' || tab === 'admin') && !isAdminAuthed) {
    pendingTab = tab;
    showAdminOverlay();
    return;
  }
  doSwitchTab(tab);
}

function doSwitchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  ['form','list','admin'].forEach((name, i) => {
    if (name === tab) document.querySelectorAll('.nav-item')[i].classList.add('active');
  });
  if (tab === 'list')  renderList();
  if (tab === 'admin') { renderAdmin(); loadBccSettings(); }
}

// ═══════════════════════════════════════
// EVENT CARD RENDERING
// ═══════════════════════════════════════
function isPastEvent(ev) {
  const now   = new Date();
  // MONTH_CODE = 'YYYY-MM' から年月を取得、日は ev.day
  const parts = MONTH_CODE.split('-');
  const evDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(ev.day));
  // 今日の0時と比較（当日はグレーアウトしない）
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return evDate < today;
}

function renderEvents() {
  const grid = document.getElementById('grid-main');
  grid.innerHTML = '';
  EVENTS.forEach(ev => {
    const past     = isPastEvent(ev);
    const wdStr    = weekdayStr(ev);
    const wdClass  = ev.wd === 6 ? 'sat' : ev.wd === 0 ? 'sun' : '';
    const isSel    = selected.has(ev.id) && !past;
    const card     = document.createElement('div');
    card.className = 'event-card' + (isSel ? ' selected' : '') + (past ? ' past' : '');
    card.innerHTML = `
      <div class="event-date-col">
        <div class="event-date-day">${ev.day}</div>
        <div class="event-date-wd ${wdClass}">${wdStr}</div>
      </div>
      <div class="event-body">
        <div class="event-name">${ev.name[currentLang] || ev.name.ja}</div>
        <div class="event-meta">${ev.time}
          ${ev.gather     ? `<div style="font-size:0.63rem;color:var(--ink-faint);margin-top:2px;">${ev.gather}</div>` : ''}
          ${ev.restricted ? `<div style="font-size:0.63rem;color:var(--gold-dark);margin-top:4px;letter-spacing:0.02em;">${t('restricted')}</div>` : ''}
        </div>
      </div>
      <div class="event-right">
        <div class="check-mark">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>`;
    if (!past) card.addEventListener('click', () => toggleEvent(ev.id));
    grid.appendChild(card);
  });
  const n = selected.size;
  document.getElementById('selCount').textContent = n;
  document.getElementById('selSummary').classList.toggle('hidden', n === 0);
}

function toggleEvent(id) {
  const ev = EVENTS.find(e => e.id === id);
  if (ev && isPastEvent(ev)) return;
  selected.has(id) ? selected.delete(id) : selected.add(id);
  renderEvents();
}

let _pendingBooking = null; // 確認モーダル承認待ちデータ

function submitForm() {
  const l = L();
  if (selected.size === 0) { showErr(l.errSelect); return; }

  const last  = document.getElementById('lastName').value.trim();
  const first = document.getElementById('firstName').value.trim();
  const email = document.getElementById('email').value.trim();
  const role  = document.getElementById('role').value;

  if (!last || !first)               { showErr(l.errName);  return; }
  if (!email || !email.includes('@')) { showErr(l.errEmail); return; }
  if (!role)                         { showErr(l.errRole);  return; }

  const langChecked = [...document.querySelectorAll('input[name="language"]:checked')].map(c => {
    if (c.value === 'その他') {
      const other = document.getElementById('otherLang').value.trim();
      return other ? t('langOther') + '（' + other + '）' : t('langOther');
    }
    return c.value;
  });
  if (langChecked.length === 0) { showErr(l.errLang); return; }

  document.getElementById('errMsg').style.display = 'none';

  const b = {
    id:       Date.now(),
    name:     currentLang === 'en' ? first + ' ' + last : last + ' ' + first,
    email,
    language: langChecked.join('・'),
    role,
    tmPrev:   TM_ROLES.includes(role) ? parseInt(document.getElementById('tmCount').value || '0', 10) : null,
    tmEscort: role === 'TM(在日)' ? document.getElementById('tmEscort').value.trim() : '',
    contact:  document.getElementById('contact').value.trim(),
    notes:    document.getElementById('notes').value.trim(),
    eventIds: [...selected],
    month:    MONTH_CODE,
    at:       new Date().toLocaleString('ja-JP'),
  };

  const prev     = bookings.find(bk => bk.email === email);
  const isUpdate = !!prev;
  const prevIds  = prev ? (prev.eventIds || []) : [];

  // 過去の法要は前回の登録内容を自動的に引き継ぐ
  const pastPrevIds = prevIds.filter(id => isPastEvent(EVENTS.find(e => e.id === id)));
  pastPrevIds.forEach(id => { if (!b.eventIds.includes(id)) b.eventIds.push(id); });

  // 追加・キャンセルは未来の法要のみで判定
  b.addedIds     = b.eventIds.filter(id => !prevIds.includes(id) && !isPastEvent(EVENTS.find(e => e.id === id)));
  b.cancelledIds = prevIds.filter(id => !b.eventIds.includes(id) && !isPastEvent(EVENTS.find(e => e.id === id)));
  b.prevEventIds = prevIds;
  b.isUpdate     = isUpdate;

  // 確認モーダルを表示
  _pendingBooking = b;
  showConfirmModal(b, isUpdate);
}

function showConfirmModal(b, isUpdate) {
  const l = L();

  // ヘッダー
  document.getElementById('cmod-title').textContent = isUpdate ? (l.updateConfirmTitle || '立願内容の確認（更新）') : (l.newConfirmTitle || '立願内容の確認');
  document.getElementById('cmod-sub').textContent   = b.name + (l.honorific || '');

  // ご奉仕リスト（完了・追加・通常）
  const activeIds    = b.eventIds.filter(id => !b.cancelledIds.includes(id));
  const svcContainer = document.getElementById('cmod-services');
  svcContainer.innerHTML = '';
  activeIds.forEach(id => {
    const ev      = EVENTS.find(e => e.id === id);
    if (!ev) return;
    const isPast  = isPastEvent(ev);
    const isAdded = b.addedIds.includes(id);
    const type    = isPast ? 'past' : isAdded ? 'added' : 'normal';
    const label   = isPast ? '完了' : isAdded ? '追加' : '◇';
    const name    = ev.day + (weekdayStr(ev) ? '（' + weekdayStr(ev) + '）' : '') + ' ' + (ev.name[currentLang] || ev.name.ja);
    svcContainer.innerHTML += `<div class="cmod-ev">
      <span class="cmod-badge ${type}">${label}</span>
      <span class="cmod-ev-name ${type}">${name}</span>
    </div>`;
  });
  document.getElementById('cmod-services-label').textContent = 'ご奉仕';

  // キャンセルセクション
  const canSec = document.getElementById('cmod-cancelled-section');
  if (b.cancelledIds.length > 0) {
    canSec.style.display = 'block';
    document.getElementById('cmod-cancelled-label').textContent = 'キャンセル';
    const canContainer = document.getElementById('cmod-cancelled');
    canContainer.innerHTML = '';
    b.cancelledIds.forEach(id => {
      const ev   = EVENTS.find(e => e.id === id);
      if (!ev) return;
      const name = ev.day + (weekdayStr(ev) ? '（' + weekdayStr(ev) + '）' : '') + ' ' + (ev.name[currentLang] || ev.name.ja);
      canContainer.innerHTML += `<div class="cmod-ev">
        <span class="cmod-badge cancelled">キャンセル</span>
        <span class="cmod-ev-name cancelled">${name}</span>
      </div>`;
    });
  } else {
    canSec.style.display = 'none';
  }

  // 立願情報
  document.getElementById('cmod-info-label').textContent = l.formSecTitle || '立願情報';
  const infoRows = [
    [l.lblRole,    b.role],
    [l.lblLang,    b.language],
    ...(TM_ROLES.includes(b.role) && b.tmPrev != null ? [[l.tmCountLabel, `${b.tmPrev + 1}回`]] : []),
    ...(b.role === 'TM(在日)' && b.tmEscort ? [[l.tmEscortLabel, b.tmEscort]] : []),
    ...(b.contact ? [[l.lblContact, b.contact]] : []),
    ...(b.notes   ? [[l.lblNotes,   b.notes]]   : []),
  ];
  document.getElementById('cmod-info').innerHTML = infoRows.map(([lbl, val]) =>
    `<div class="cmod-row"><span class="cmod-row-label">${lbl}</span><span class="cmod-row-val">${val}</span></div>`
  ).join('');

  // ボタン
  document.getElementById('cmod-btn-back').textContent = l.cancelBtn || '戻る';
  document.getElementById('cmod-btn-ok').textContent   = l.submitBtn || '立願を確定する';

  document.getElementById('confirmModal').classList.add('open');
}

function closeConfirmModal() {
  document.getElementById('confirmModal').classList.remove('open');
  _pendingBooking = null;
}

function submitConfirmed() {
  const b = _pendingBooking;
  if (!b) return;
  _pendingBooking = null;
  document.getElementById('confirmModal').classList.remove('open');

  const l        = L();
  const isUpdate = b.isUpdate;

  const evLines = b.eventIds.map(id => {
    const ev     = EVENTS.find(e => e.id === id);
    const isPast = isPastEvent(ev);
    const prefix = isPast ? '[完了] ' : (isUpdate && b.addedIds.includes(id) ? '[追加] ' : '');
    return prefix + ev.day + (weekdayStr(ev) ? '（' + weekdayStr(ev) + '）' : '') + ' ' + (ev.name[currentLang] || ev.name.ja);
  });

  bookings = bookings.filter(bk => bk.email !== b.email);
  bookings.push(b);

  saveToDb(b, evLines, isUpdate);
  sendConfirmEmail(b, evLines, isUpdate);

  // BCC通知（追加・キャンセルが直近日数以内にある場合）
  if ((b.addedIds || []).length > 0 || (b.cancelledIds || []).length > 0) {
    getBccTarget().then(bcc => {
      if (bcc && needsBccNotification(b, bcc.days)) {
        sendBccEmail(b, evLines, isUpdate, bcc.email);
      }
    });
  }

  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('confirmBlock').classList.add('vis');
  document.getElementById('confirmName').textContent = b.name + (l.honorific || '');
  document.getElementById('confirmEvents').innerHTML = evLines.map(ln => '<div class="confirm-event-item">' + ln + '</div>').join('');
  showToast(b.name + (l.honorific || '') + '  ' + b.eventIds.length + ' ' + l.toastSuffix);
  renderEvents();
}

// VOLUNTEER LIST RENDERING

function buildAttItem(b, idx, evIdx, evId) {
  let name = (ROLE_PREFIX[b.role] || '') + b.name + langTag(b.language);
  if (TM_ROLES.includes(b.role) && b.tmPrev != null && evIdx != null) {
    const count = b.tmPrev + evIdx + 1;
    name += b.role === 'TM(在日)' && b.tmEscort
      ? ` (TM${count}回目、付き添い:${b.tmEscort})`
      : ` (TM${count}回目)`;
  } else if (b.role === 'TM(在日)' && b.tmEscort) {
    name += ` (付き添い:${b.tmEscort})`;
  }

  const ev          = evId ? EVENTS.find(e => e.id === evId) : null;
  const isPast      = ev ? isPastEvent(ev) : false;
  const isAdded     = evId && b.status === '更新' && (b.addedIds || []).includes(evId);
  const isCancelled = evId && (b.cancelledEventIds || []).includes(evId);

  let nameStyle = '', badge = '';
  if (isCancelled) {
    nameStyle = 'color:var(--danger);text-decoration:line-through;';
    badge = '<span style="font-size:0.62rem;color:var(--danger);margin-left:4px;">✕キャンセル</span>';
  } else if (isAdded) {
    nameStyle = 'color:var(--added);';
    badge = '<span style="font-size:0.62rem;color:var(--added);margin-left:4px;">＋追加</span>';
  } else if (isPast) {
    nameStyle = 'color:var(--ink-faint);';
    badge = '<span style="font-size:0.62rem;color:var(--ink-faint);margin-left:4px;">✓完了</span>';
  }

  const el = document.createElement('div');
  el.className = 'attendee-item';
  el.innerHTML = `
    <div class="att-num">${isCancelled ? '－' : idx + 1}</div>
    <div class="att-avatar" style="${isCancelled ? 'opacity:0.4;' : isPast ? 'opacity:0.5;' : ''}">${(b.name || '').slice(0, 1)}</div>
    <div class="att-info">
      <div class="att-name" style="${nameStyle}">${name}${badge}</div>
      ${b.notes ? `<div class="att-sub">💬 ${b.notes}</div>` : ''}
    </div>`;
  return el;
}

function renderEventGroup(ev, wrap) {
  const active    = sortByRole(bookings.filter(b => b.eventIds && b.eventIds.includes(ev.id)));
  const cancelled = bookings.filter(b => (b.cancelledEventIds || []).includes(ev.id));
  if (!active.length && !cancelled.length) return;

  const g = document.createElement('div');
  g.className = 'att-group';
  g.innerHTML = `<div class="att-group-label">${ev.day}${weekdayStr(ev) ? '（' + weekdayStr(ev) + '）' : ''} ${ev.name[currentLang] || ev.name.ja} — ${groupCountLabel(active)}</div>`;

  let idx = 0;
  active.forEach(b => {
    b.addedIds = b.status === '更新' ? b.eventIds.filter(id => !(b.prevEventIds || []).includes(id)) : [];
    g.appendChild(buildAttItem(b, idx++, b.eventIds.indexOf(ev.id), ev.id));
  });
  cancelled.forEach(b => g.appendChild(buildAttItem(b, idx++, 0, ev.id)));
  wrap.appendChild(g);
}

function renderList() {
  const l = L();
  const filterDiv = document.getElementById('listFilter');
  filterDiv.innerHTML =
    `<button class="filter-btn${listFilter === 'all' ? ' active' : ''}" onclick="setFilter('all')">${l.filterAll}</button>` +
    EVENTS.map(ev =>
      `<button class="filter-btn${listFilter === ev.id ? ' active' : ''}" onclick="setFilter('${ev.id}')">${ev.day}日 ${ev.name[currentLang] || ev.name.ja}</button>`
    ).join('');

  const wrap  = document.getElementById('attList');
  const empty = document.getElementById('listEmpty');
  wrap.innerHTML = '';

  if (!bookings.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  if (listFilter === 'all') {
    EVENTS.forEach(ev => renderEventGroup(ev, wrap));
    const legacy = bookings.filter(b => !b.eventIds || !b.eventIds.length);
    if (legacy.length) {
      const g = document.createElement('div');
      g.className = 'att-group';
      g.innerHTML = `<div class="att-group-label">その他 — ${legacy.length}名</div>`;
      legacy.forEach((b, i) => g.appendChild(buildAttItem(b, i)));
      wrap.appendChild(g);
    }
  } else {
    const active    = sortByRole(bookings.filter(b => b.eventIds && b.eventIds.includes(listFilter)));
    const cancelled = bookings.filter(b => (b.cancelledEventIds || []).includes(listFilter));
    if (!active.length && !cancelled.length) { empty.style.display = 'block'; return; }

    const countDiv = document.createElement('div');
    countDiv.style.cssText = 'font-size:0.72rem;color:var(--ink-mid);margin-bottom:10px;letter-spacing:0.06em;';
    countDiv.textContent = groupCountLabel(active);
    wrap.appendChild(countDiv);

    let idx = 0;
    active.forEach(b => {
      b.addedIds = b.status === '更新' ? b.eventIds.filter(id => !(b.prevEventIds || []).includes(id)) : [];
      wrap.appendChild(buildAttItem(b, idx++, b.eventIds.indexOf(listFilter), listFilter));
    });
    cancelled.forEach(b => wrap.appendChild(buildAttItem(b, idx++, 0, listFilter)));
  }
}

function setFilter(f) { listFilter = f; renderList(); }

// ═══════════════════════════════════════
// EXCEL DOWNLOAD
// ═══════════════════════════════════════
function downloadExcel() {
  if (!bookings.length) { alert('立願データがありません'); return; }

  const wb       = XLSX.utils.book_new();
  const rows     = [];
  const merges   = [];
  const groupRows = [];

  function langShort(s) {
    return (s || '').split('・').map(l => LANG_ABBR[l] || '他').join('');
  }
  function roleShort(b, evId) {
    if (b.role === 'センター' || b.role === 'アシスタント') return b.role;
    if (b.role === '在日' || b.role === '日本人') return '';
    if (TM_ROLES.includes(b.role) && b.tmPrev != null) {
      const idx = Math.max(0, (b.eventIds || []).indexOf(evId));
      return `TM${b.tmPrev + idx + 1}回目`;
    }
    return b.role || '';
  }
  function notesCell(b) {
    const p = [];
    if (b.role === 'TM(在日)' && b.tmEscort) p.push('付き添い:' + b.tmEscort);
    if (b.notes) p.push(b.notes);
    return p.join('、');
  }

  rows.push({ cells:['法要','人数','役割','氏名','言語','連絡担当','備考'], isHeader:true });

  EVENTS.forEach(ev => {
    const active    = sortByRole(bookings.filter(b => b.eventIds && b.eventIds.includes(ev.id)));
    const cancelled = bookings.filter(b => (b.cancelledEventIds || []).includes(ev.id));
    const label     = `${ev.day}（${weekdayStr(ev)}） ${ev.name[currentLang] || ev.name.ja}`;
    const ca        = active.filter(b => b.role === 'センター' || b.role === 'アシスタント').length;
    const count     = `C+A: ${ca} / 全: ${active.length}`;
    const groupStart = rows.length;
    groupRows.push(groupStart);

    if (!active.length && !cancelled.length) {
      rows.push({ cells:[label, count, '','','','',''] });
      return;
    }
    active.forEach((b, i) => {
      const isPast   = isPastEvent(ev);
      const isAdded  = !isPast && b.status === '更新' && (b.prevEventIds || []).length > 0 && !(b.prevEventIds || []).includes(ev.id);
      rows.push({ cells:[i === 0 ? label : '', i === 0 ? count : '', roleShort(b, ev.id), b.name, langShort(b.language), b.contact || '', notesCell(b)], isAdded, isPast });
    });
    if (active.length > 1) {
      merges.push({ s:{r:groupStart,c:0}, e:{r:groupStart+active.length-1,c:0} });
      merges.push({ s:{r:groupStart,c:1}, e:{r:groupStart+active.length-1,c:1} });
    }
    cancelled.forEach(b => rows.push({ cells:['','', roleShort(b, ev.id), b.name, langShort(b.language), b.contact || '', notesCell(b)], isCancelled:true }));
  });

  const ws  = XLSX.utils.aoa_to_sheet(rows.map(r => r.cells));
  ws['!merges']     = merges;
  ws['!sheetViews'] = [{ state:'frozen', ySplit:1, topLeftCell:'A2' }];
  ws['!cols']       = [{wch:32},{wch:14},{wch:12},{wch:14},{wch:10},{wch:10},{wch:24}];

  const thin  = { style:'thin',   color:{rgb:'AAAAAA'} };
  const thick = { style:'medium', color:{rgb:'555555'} };
  const N     = 7;
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
  for (let R = range.s.r; R <= range.e.r; R++) {
    const meta = rows[R] || {};
    for (let C = 0; C < N; C++) {
      const addr = XLSX.utils.encode_cell({r:R, c:C});
      if (!ws[addr]) ws[addr] = {t:'s',v:''};
      ws[addr].s = {
        font: { name:'Meiryo UI', sz:10, bold:!!meta.isHeader,
          color:{ rgb: meta.isCancelled ? '8B3A3A' : meta.isAdded ? '2A5EA8' : meta.isPast ? 'A89F96' : '2A2520' },
          strike: !!meta.isCancelled },
        alignment: { vertical:'top', wrapText:true },
        fill: meta.isHeader ? { fgColor:{rgb:'F0EBE3'}, patternType:'solid' } : { patternType:'none' },
        border: {
          top:    (meta.isHeader || groupRows.includes(R)) ? thick : thin,
          bottom: R === rows.length - 1 ? thick : thin,
          left:   C === 0     ? thick : thin,
          right:  C === N - 1 ? thick : thin,
        },
      };
    }
  }
  XLSX.utils.book_append_sheet(wb, ws, 'ご奉仕者一覧');
  const d = new Date();
  XLSX.writeFile(wb, `GLAD_ogen_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.xlsx`);
}

// ═══════════════════════════════════════
// ADMIN AUTH
// ═══════════════════════════════════════
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function getStoredHash() {
  const res  = await fetch(`${SUPABASE_URL}/rest/v1/settings?key=eq.${encodeURIComponent(ADMIN_PW_SETTING)}&select=value`, {
    headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY },
  });
  const rows = await res.json();
  if (Array.isArray(rows) && rows.length) return rows[0].value;
  const defaultHash = await sha256('admin1234');
  await fetch(`${SUPABASE_URL}/rest/v1/settings`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY, 'Content-Type':'application/json', Prefer:'resolution=merge-duplicates' },
    body: JSON.stringify({ key: ADMIN_PW_SETTING, value: defaultHash }),
  });
  return defaultHash;
}

function switchLoginTab(tab) {
  currentLoginTab = tab;
  document.getElementById('login-tab-pw').style.display = tab === 'pw' ? 'block' : 'none';
  document.getElementById('login-tab-su').style.display = tab === 'su' ? 'block' : 'none';
  const pwBtn = document.getElementById('tab-pw-btn');
  const suBtn = document.getElementById('tab-su-btn');

  pwBtn.style.color = tab === 'pw' ? 'var(--gold-dark)' : 'var(--ink-faint)';
  suBtn.style.borderBottomColor = tab === 'su' ? 'var(--gold)' : 'transparent';
  suBtn.style.color = tab === 'su' ? 'var(--gold-dark)' : 'var(--ink-faint)';
  document.getElementById('overlay-err').textContent = '';
}

function showAdminOverlay() {
  switchLoginTab('pw');
  ['adminPwInput','adminEmailInput','adminSuPwInput'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('overlay-err').textContent = '';
  document.getElementById('adminOverlay').classList.add('open');
  setTimeout(() => document.getElementById('adminPwInput').focus(), 50);
}

async function confirmAdminLogin() {
  const btn = document.getElementById('overlay-ok');
  const err = document.getElementById('overlay-err');
  btn.textContent = '...';
  err.textContent = '';
  try {
    if (currentLoginTab === 'pw') {
      const hash   = await sha256(document.getElementById('adminPwInput').value);
      const stored = await getStoredHash();
      if (hash === stored) {
        isAdminAuthed = true; isSuperUser = false;
        document.getElementById('adminOverlay').classList.remove('open');
        document.getElementById('admin-user-label').textContent = '管理者';
        document.getElementById('pw-change-section').style.display = 'none';
        if (pendingTab) { doSwitchTab(pendingTab); pendingTab = null; }
      } else {
        err.textContent = 'パスワードが正しくありません';
        document.getElementById('adminPwInput').value = '';
        document.getElementById('adminPwInput').focus();
      }
    } else {
      const email    = document.getElementById('adminEmailInput').value.trim();
      const password = document.getElementById('adminSuPwInput').value;
      const res      = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method:'POST',
        headers:{ apikey: SUPABASE_KEY, 'Content-Type':'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (res.ok && data.access_token && email === SUPER_USER_EMAIL) {
        isAdminAuthed = true; isSuperUser = true;
        document.getElementById('adminOverlay').classList.remove('open');
        document.getElementById('admin-user-label').textContent = email;
        document.getElementById('pw-change-section').style.display = 'block';
        if (pendingTab) { doSwitchTab(pendingTab); pendingTab = null; }
      } else {
        err.textContent = 'ログインできませんでした';
        document.getElementById('adminSuPwInput').value = '';
      }
    }
  } catch(e) {
    err.textContent = 'エラーが発生しました';
  }
  btn.textContent = '確認';
}

function cancelAdminLogin() {
  document.getElementById('adminOverlay').classList.remove('open');
  pendingTab = null;
}

function adminLogout() {
  isAdminAuthed = false; isSuperUser = false;
  document.getElementById('admin-user-label').textContent = '';
  document.getElementById('pw-change-section').style.display = 'none';
  doSwitchTab('form');
  showToast('ログアウトしました');
}

async function changeAdminPassword() {
  const newPw   = document.getElementById('new-pw-input').value;
  const confirm = document.getElementById('new-pw-confirm').value;
  const errEl   = document.getElementById('pw-change-err');
  errEl.textContent = '';
  if (!newPw || newPw.length < 6) { errEl.textContent = '6文字以上で入力してください'; return; }
  if (newPw !== confirm)          { errEl.textContent = 'パスワードが一致しません';    return; }
  const hash = await sha256(newPw);
  const res  = await fetch(`${SUPABASE_URL}/rest/v1/settings`, {
    method:'POST',
    headers:{ apikey: SUPABASE_KEY, Authorization:'Bearer '+SUPABASE_KEY, 'Content-Type':'application/json', Prefer:'resolution=merge-duplicates' },
    body: JSON.stringify({ key: ADMIN_PW_SETTING, value: hash }),
  });
  if (res.ok) {
    document.getElementById('new-pw-input').value = '';
    document.getElementById('new-pw-confirm').value = '';
    showToast('✓ パスワードを変更しました');
  } else {
    errEl.textContent = '保存に失敗しました';
  }
}

// RECEPTION ON/OFF
// ═══════════════════════════════════════
function updateReceptionUI(isOpen) {
  receptionOpen = isOpen;
  const btn      = document.getElementById('reception-toggle-btn');
  const lbl      = document.getElementById('reception-status-label');
  const formWrap = document.getElementById('formWrap');
  const closedMsg = document.getElementById('reception-closed-msg');
  if (isOpen) {
    btn.textContent = '受付中 → 閉じる';
    btn.style.background = 'var(--danger)';
    btn.style.color = '#fff';
    lbl.textContent = '現在受付中です';
    if (formWrap)   formWrap.style.display   = 'block';
    if (closedMsg)  closedMsg.style.display  = 'none';
  } else {
    btn.textContent = '受付停止中 → 開く';
    btn.style.background = 'var(--ink)';
    btn.style.color = 'rgba(255,255,255,0.85)';
    lbl.textContent = '現在受付を停止しています';
    if (formWrap)   formWrap.style.display   = 'none';
    if (closedMsg)  closedMsg.style.display  = 'block';
  }
}

function loadReceptionStatus() {
  fetch(`${SUPABASE_URL}/rest/v1/settings?key=eq.${encodeURIComponent(RECEPTION_SETTING)}&select=value`, {
    headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY },
  })
  .then(r => r.json())
  .then(rows => updateReceptionUI(Array.isArray(rows) && rows.length > 0 && rows[0].value === 'open'))
  .catch(() => updateReceptionUI(false));
}

function toggleReception() {
  const newState = !receptionOpen;
  const headers  = { apikey: SUPABASE_KEY, Authorization:'Bearer '+SUPABASE_KEY, 'Content-Type':'application/json', Prefer:'resolution=merge-duplicates' };
  fetch(`${SUPABASE_URL}/rest/v1/settings`, {
    method:'POST', headers,
    body: JSON.stringify({ key: RECEPTION_SETTING, value: newState ? 'open' : 'closed' }),
  })
  .then(res => {
    if (res.ok || res.status === 409) {
      updateReceptionUI(newState);
      showToast(newState ? '✓ 受付を開始しました' : '✓ 受付を停止しました');
    }
  })
  .catch(() => showToast('エラーが発生しました'));
}


// ═══════════════════════════════════════
// BCC NOTIFICATION SETTINGS
// ═══════════════════════════════════════
async function loadBccSettings() {
  try {
    const keys = [BCC_EMAIL_SETTING, BCC_DAYS_SETTING];
    const res  = await fetch(
      `${SUPABASE_URL}/rest/v1/settings?key=in.(${keys.map(k => `"${k}"`).join(',')})&select=key,value`,
      { headers: dbHeaders() }
    );
    const rows = await res.json();
    if (!Array.isArray(rows)) return;

      if (r.key === BCC_EMAIL_SETTING) {
        const el = document.getElementById('bcc-email-input');

      if (r.key === BCC_DAYS_SETTING) {
        const el = document.getElementById('bcc-days-input');
        if (el) el.value = r.value || '3';
      }
    });
  } catch(e) { console.warn('BCC settings load error:', e); }
}

async function saveBccSettings() {

async function getBccTarget() {
  // BCC設定をDBから取得して返す {email, days}
  try {
    const keys = [BCC_EMAIL_SETTING, BCC_DAYS_SETTING];
    const res  = await fetch(
      `${SUPABASE_URL}/rest/v1/settings?key=in.(${keys.map(k => `"${k}"`).join(',')})&select=key,value`,
      { headers: dbHeaders() }
    );
    const rows = await res.json();
    if (!Array.isArray(rows)) return null;
    const emailRow = rows.find(r => r.key === BCC_EMAIL_SETTING);
    const daysRow  = rows.find(r => r.key === BCC_DAYS_SETTING);
    const email    = emailRow ? emailRow.value : '';
    const days     = daysRow  ? parseInt(daysRow.value, 10) : 3;
    return email ? { email, days } : null;
  } catch(e) { return null; }
}

function needsBccNotification(b, bccDays) {
  // 追加・キャンセルされた法要のうち、今日〜bccDays日後以内のものがあるかチェック
  const today    = new Date();
  today.setHours(0,0,0,0);
  const parts    = MONTH_CODE.split('-');
  const deadline = new Date(today.getTime() + bccDays * 86400000);
  const changedIds = [...(b.addedIds || []), ...(b.cancelledIds || [])];
  return changedIds.some(id => {
    const ev = EVENTS.find(e => e.id === id);
    if (!ev) return false;
    const evDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(ev.day));
    return evDate >= today && evDate <= deadline;
  });
}

function sendBccEmail(b, evLines, isUpdate, bccEmailStr) {
  // カンマ区切りで複数アドレスに対応
  const addresses = bccEmailStr.split(',').map(e => e.trim()).filter(e => e.includes('@'));
  if (!addresses.length) return;

  const changedEvs = [...(b.addedIds || []).map(id => {
    const ev = EVENTS.find(e => e.id === id);
    return ev ? `[追加] ${ev.day}（${weekdayStr(ev)}） ${ev.name.ja}` : null;
  }), ...(b.cancelledIds || []).map(id => {
    const ev = EVENTS.find(e => e.id === id);
    return ev ? `[キャンセル] ${ev.day}（${weekdayStr(ev)}） ${ev.name.ja}` : null;
  })].filter(Boolean);

  const body = `【立願${isUpdate ? '更新' : '新規'}通知】${b.name}\n\n対象月：${I18N.ja.period}（${MONTH_CODE}）\n\n【変更内容】\n${changedEvs.join('\n')}\n\n【立願情報】\n役割：${b.role}\n対応言語：${b.language}${b.tmPrev != null ? '\nTM回数：今回が' + (b.tmPrev + 1) + '回目' : ''}${b.contact ? '\n連絡担当：' + b.contact : ''}${b.notes ? '\nご伝言：' + b.notes : ''}\n\nGLAD応現院`;

  const subject = `【BCC通知】${b.name} 様 立願${isUpdate ? '更新' : '新規'}（${I18N.ja.period}）`;

  addresses.forEach(toEmail => {
    emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
      to_email: toEmail,

function dbHeaders(extra = {}) {
  return { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY, ...extra };
}

function saveToDb(b, evLines, isUpdate) {
  const payload = {
    at:                  b.at,
    name:                b.name,
    email:               b.email,
    language:            b.language,
    role:                b.role,
    tm_prev:             b.tmPrev ?? null,
    tm_escort:           b.tmEscort || '',
    events:              evLines.join(' / '),
    event_ids:           JSON.stringify(b.eventIds),
    prev_event_ids:      JSON.stringify(b.prevEventIds || []),
    cancelled_event_ids: JSON.stringify(b.cancelledIds || []),
    contact:             b.contact || '',
    notes:               b.notes || '',
    status:              isUpdate ? '更新' : '新規',
    project:             PROJECT_CODE,
    month:               MONTH_CODE,
  };
  const h = dbHeaders({ 'Content-Type':'application/json', Prefer:'return=minimal' });

  // DBに既存レコードがあるか確認してから保存（言語が違っても同一メールなら更新扱い）
  fetch(`${SUPABASE_URL}/rest/v1/reservations?email=eq.${encodeURIComponent(b.email)}&month=eq.${MONTH_CODE}&select=id`, {
    headers: dbHeaders(),
  })
  .then(r => r.json())
  .then(existing => {
    const existsInDb = Array.isArray(existing) && existing.length > 0;
    // DBに存在すれば必ず「更新」扱いにする
    if (existsInDb && !isUpdate) payload.status = '更新';
    return fetch(`${SUPABASE_URL}/rest/v1/reservations?email=eq.${encodeURIComponent(b.email)}&month=eq.${MONTH_CODE}`, { method:'DELETE', headers:h });
  })
  .then(() => fetch(`${SUPABASE_URL}/rest/v1/reservations`, { method:'POST', headers:h, body:JSON.stringify(payload) }))
  .then(res => { if (!res.ok) return res.text().then(t => { throw new Error(t); }); loadFromDb(); })
  .catch(err => console.warn('Supabase save error:', err));
}

function loadFromDb() {
  fetch(`${SUPABASE_URL}/rest/v1/reservations?select=*&month=eq.${MONTH_CODE}&order=at.asc`, {
    headers: dbHeaders(),
  })
  .then(r => r.json())
  .then(rows => {
    if (!Array.isArray(rows)) return;
    bookings = rows.map(r => {
      const parse = str => { try { return str ? JSON.parse(str) : []; } catch(e) { return []; } };
      return {
        id:                 r.id || Date.now(),
        name:               r.name || '',
        email:              r.email || '',
        language:           r.language || '',
        role:               r.role || '',
        tmPrev:             r.tm_prev != null ? parseInt(r.tm_prev, 10) : null,
        tmEscort:           r.tm_escort || '',
        contact:            r.contact || '',
        notes:              r.notes || '',
        events:             r.events || '',
        eventIds:           parse(r.event_ids),
        prevEventIds:       parse(r.prev_event_ids),
        cancelledEventIds:  parse(r.cancelled_event_ids),
        at:                 r.at || '',
        status:             r.status || '新規',
      };
    });
    renderList();
    renderAdmin();
  })
  .catch(err => console.warn('Supabase load error:', err));
}

function sendConfirmEmail(b, evLines, isUpdate) {
  const l = L();
  function tmBlock(lang) {
    if (!TM_ROLES.includes(b.role)) return '';
    const count  = (b.tmPrev ?? 0) + 1;
    const escort = b.role === 'TM(在日)' && b.tmEscort ? b.tmEscort : '';
    if (lang === 'ja') return `\nTM回数：今回が${count}回目` + (escort ? `\n付き添い：${escort}` : '');
    if (lang === 'zh') return `\nTM次数：第${count}次`       + (escort ? `\n陪同者：${escort}`   : '');
    return                    `\nTM Count: ${count}th service` + (escort ? `\nEscort: ${escort}`   : '');
  }
  function cancelBlock(lang) {
    const lines = (b.cancelledIds || []).map(id => {
      const ev = EVENTS.find(e => e.id === id);
      if (!ev) return null;
      const day = ev.day + (weekdayStr(ev) ? `（${weekdayStr(ev)}）` : '');
      if (lang === 'ja') return `[キャンセル] ${day} ${ev.name.ja}`;
      if (lang === 'zh') return `[取消] ${day} ${ev.name.zh || ev.name.ja}`;
      return `[Cancelled] ${day} ${ev.name.en || ev.name.ja}`;
    }).filter(Boolean);
    if (!lines.length) return '';
    if (lang === 'ja') return '\n\n【キャンセル】\n' + lines.join('\n');
    if (lang === 'zh') return '\n\n【取消项目】\n'   + lines.join('\n');
    return                    '\n\n[Cancelled]\n'    + lines.join('\n');
  }
  const contact = { ja: b.contact ? `\n連絡担当：${b.contact}` : '', zh: b.contact ? `\n联络负责人：${b.contact}` : '', en: b.contact ? `\nContact: ${b.contact}` : '' };
  const period  = { ja: I18N.ja.period, zh: I18N.zh.period, en: I18N.en.period };
  const svcs    = evLines.join('\n');
  const notes   = { ja: b.notes ? `\nご伝言：${b.notes}` : '', zh: b.notes ? `\n留言：${b.notes}` : '', en: b.notes ? `\nMessage: ${b.notes}` : '' };
  const subjects = {
    ja: isUpdate ? '【立願更新】GLAD ご奉仕立願'   : '【立願確認】GLAD ご奉仕立願',
    zh: isUpdate ? '【志愿更新】GLAD 奉仕志愿'      : '【志愿确认】GLAD 奉仕志愿',
    en: isUpdate ? '[Registration Updated] GLAD Gohoshi' : '[Registration Confirmed] GLAD Gohoshi',
  };
  const bodies = {
    ja: `${b.name} 様\n\n${isUpdate?'以下の内容で立願を更新いたしました。':'以下のご奉仕の立願が完了いたしました。'}\n\n対象月：${period.ja}（${MONTH_CODE}）\n\n【ご奉仕】\n${svcs}${cancelBlock('ja')}\n\n【立願情報】\n役割：${b.role}\n対応言語：${b.language}${tmBlock('ja')}${contact.ja}${notes.ja}\n\n当日のご奉仕をお待ちしております。\nGLAD応現院`,
    zh: `${b.name}\n\n${isUpdate?'您的志愿已更新如下。':'以下奉仕的志愿已确认。'}\n\n对象月份：${period.zh}（${MONTH_CODE}）\n\n【奉仕项目】\n${svcs}${cancelBlock('zh')}\n\n【志愿信息】\n角色：${b.role}\n对应语言：${b.language}${tmBlock('zh')}${contact.zh}${notes.zh}\n\n期待您的到来。\nGLAD応現院`,
    en: `Dear ${b.name},\n\n${isUpdate?'Your registration has been updated as follows.':'Your registration has been confirmed.'}\n\nMonth: ${period.en} (${MONTH_CODE})\n\n[Services]\n${svcs}${cancelBlock('en')}\n\n[Registration Details]\nRole: ${b.role}\nLanguage: ${b.language}${tmBlock('en')}${contact.en}${notes.en}\n\nWe look forward to welcoming you.\nGLAD Ogen-in`,
  };
  const lang = currentLang;
  emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
    to_email: b.email,
    to_name:  b.name + ' 様',
    subject:  subjects[lang] || subjects.ja,
    body:     bodies[lang]   || bodies.ja,
  }).catch(err => console.warn('EmailJS error:', err));
}
